<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calico Unified Platform</title>
<style>
  :root{
    --bg:#1A1D24;
    --title:#F3F4F6;
    --subtitle:#9CA3AF;
    --label:#F5F7FB;
    --trace-dim:#3A4A8C;
    --trace-bright:#9AB8FF;
    --feature:#9CA3AF;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
  /* center the fixed-size stage inside whatever container we're dropped into
     (full window, a Google Sites embed iframe, a phone screen, etc.) */
  body{display:flex;align-items:center;justify-content:center}
  /* the stage is a fixed internal coordinate space; everything inside is
     positioned relative to it, and the whole thing is scaled to fit by JS.
     because all child elements keep their exact relative positions, resizing
     the container simply shrinks/grows the entire scene as one unit. */
  #stage{position:relative;width:1280px;height:700px;flex:0 0 auto;
    transform-origin:center center;background:var(--bg)}

  .topbar{position:absolute;top:34px;left:0;right:0;text-align:center;z-index:60;pointer-events:none}
  .topbar h1{color:var(--title);font-size:31px;font-weight:600;letter-spacing:.01em}
  .topbar p{color:var(--subtitle);font-size:16px;font-weight:400;margin-top:8px;letter-spacing:.10em;transition:opacity .6s}
  #app.stack .topbar p,#app.focus .topbar p,#app.build .topbar p{opacity:0}
  /* breadcrumb: where am I (focus/build only) */
  .crumb{color:var(--feature);font-size:13px;font-weight:500;letter-spacing:.04em;margin-top:9px;
    opacity:0;transition:opacity .5s;height:0}
  #app.focus .crumb,#app.build .crumb{opacity:1}
  .crumb b{color:#C9D2E6;font-weight:600}
  /* quiet Back control (focus + build) */
  .backbtn{position:absolute;top:40px;left:40px;z-index:70;display:inline-flex;align-items:center;gap:7px;
    color:var(--subtitle);font-size:13px;font-weight:500;letter-spacing:.06em;cursor:pointer;
    padding:8px 14px;border-radius:9px;border:1px solid rgba(140,150,170,.2);background:rgba(40,46,62,.4);
    opacity:0;pointer-events:none;transition:opacity .35s,background .25s,border-color .25s}
  .backbtn:hover{background:rgba(40,46,62,.7);border-color:rgba(140,150,170,.4);color:var(--label)}
  #app.focus .backbtn,#app.build .backbtn{opacity:1;pointer-events:auto}
  .backbtn .ar{font-size:15px;line-height:1}

  #app{position:absolute;inset:0}
  .scene{position:absolute;inset:0;z-index:10}

  /* ---- static image shield crown ---- */
  .shieldWrap{position:absolute;left:50%;top:50%;z-index:45;cursor:pointer;
    transform:translate(-50%,-50%) scale(1);
    transition:transform 1s cubic-bezier(.22,.61,.36,1),opacity .6s}
  .shieldImg{display:block;width:118px;height:auto;
    filter:drop-shadow(0 0 14px rgba(250,140,25,.45)) drop-shadow(0 0 6px rgba(250,140,25,.35));
    animation:float 4.5s ease-in-out infinite;transition:filter .35s}
  @keyframes float{0%,100%{transform:translateY(-4px)}50%{transform:translateY(4px)}}
  #app.landing .shieldWrap:hover .shieldImg{filter:drop-shadow(0 0 26px rgba(250,140,25,.75)) drop-shadow(0 0 12px rgba(250,140,25,.55))}
  @media (prefers-reduced-motion:reduce){.shieldImg{animation:none}}


  /* ---- isometric slabs with glowing edges + skewed side-face label ---- */
  .slab{position:absolute;left:50%;top:50%;width:320px;height:170px;cursor:pointer;opacity:0;
    transition:transform 1s cubic-bezier(.22,.61,.36,1),opacity .8s,filter .5s}
  .slab .iso{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}
  .slab .iso polygon{pointer-events:none;stroke-linejoin:round}
  .slab .iso .f-left,.slab .iso .f-right{pointer-events:auto}
  .slab .f-top{fill:var(--c-top)}
  .slab .f-left{fill:var(--c-left)}
  .slab .f-right{fill:var(--c-right)}
  /* glowing edge lines along the whole cuboid */
  .slab .edges{fill:none;stroke:var(--c-edge);stroke-width:1.2;stroke-linejoin:round;stroke-linecap:round;opacity:.4;transition:stroke-width .35s,opacity .35s,filter .35s}
  /* skewed label sitting on the front-LEFT side face */
  .explore{position:absolute;left:73%;top:60%;transform:translate(-50%,-50%) skewY(-13.7deg) scaleY(.96) translateY(4px);
    transform-origin:center;color:#CFE0FF;font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;text-shadow:0 1px 4px rgba(0,0,0,.6);white-space:nowrap}
  #app.stack .slab:hover .explore,#app.focus .slab:hover .explore{opacity:.9;transform:translate(-50%,-50%) skewY(-13.7deg) scaleY(.96) translateY(0)}
  .slab-label{position:absolute;left:27%;top:60%;transform:translate(-50%,-50%) skewY(13.7deg) scaleY(.96);
    transform-origin:center;color:var(--label);font-size:13px;font-weight:600;letter-spacing:.08em;
    white-space:nowrap;text-shadow:0 1px 4px rgba(0,0,0,.6);pointer-events:none}

  /* per-slab colors (blues/purples) + edge tint + anchor + fly-in side */
  .slab[data-slab="security"]     {--c-top:#5C7AB8;--c-left:#445C92;--c-right:#36487A;--c-edge:#9DB4E0;--ty:-84px;--fx:900px;z-index:23}
  .slab[data-slab="networking"]   {--c-top:#6A66B0;--c-left:#4E4A8E;--c-right:#3B3870;--c-edge:#ABA8DC;--ty:-168px;--fx:-900px;z-index:24}
  .slab[data-slab="observability"]{--c-top:#7E66AE;--c-left:#5E4A8C;--c-right:#46376E;--c-edge:#BCA9DC;--ty:0px;--fx:-900px;z-index:22}
  .slab[data-slab="vm"]           {--c-top:#9166AE;--c-left:#6D478E;--c-right:#503370;--c-edge:#C7A9DC;--ty:170px;--fx:900px;z-index:21}

  .slab{transform:translate(calc(-50% + var(--fx)),calc(-50% + var(--ty)))}
  #app.stack .slab,#app.focus .slab{transform:translate(-50%,calc(-50% + var(--ty)));opacity:1}
  #app.stack .slab[data-slab="networking"]{transition-delay:0s}
  #app.stack .slab[data-slab="security"]{transition-delay:.1s}
  #app.stack .slab[data-slab="observability"]{transition-delay:.2s}
  #app.stack .slab[data-slab="vm"]{transition-delay:.3s}
  #app.stack .slab:hover .edges,#app.focus .slab:hover .edges{stroke-width:2.6;opacity:1;filter:drop-shadow(0 0 9px var(--c-edge)) drop-shadow(0 0 3px var(--c-edge))}

  #app.stack .shieldWrap{transform:translate(-50%,-50%) translateY(-228px) scale(.66)}
  /* drill-in: shield glides up to dock beside the title (same anchor -> smooth tween) */
  #app.focus .shieldWrap,#app.build .shieldWrap{
    transform:translate(-50%,-50%) translateY(calc(-350px + 50px)) translateX(-225px) scale(.4);opacity:.92}
  #app.focus .shieldImg,#app.build .shieldImg{animation:none;filter:drop-shadow(0 0 10px rgba(250,140,25,.5))}
  #app.focus .shieldWrap:hover .shieldImg,#app.build .shieldWrap:hover .shieldImg{filter:drop-shadow(0 0 18px rgba(250,140,25,.85))}
  #app.focus .shieldWrap,#app.build .shieldWrap{cursor:pointer}

  /* ---- focus (behavior B) ---- */
  #app.focus .slab.is-focused{transform:translate(calc(-50% - 330px),-50%) scale(1.1);opacity:1;z-index:30;transition-delay:0s}
  #app.focus .slab.is-focused .edges{stroke-width:2.8;opacity:1;filter:drop-shadow(0 0 12px var(--c-edge)) drop-shadow(0 0 4px var(--c-edge))}
  #app.focus .slab.is-dimmed{opacity:0;filter:blur(2px);transition:transform 1s cubic-bezier(.22,.61,.36,1),opacity .7s,filter .7s;transition-delay:0s}
  #app.focus .slab.is-dimmed{transform:translate(-50%,calc(-50% + var(--ty))) scale(.78)}

  /* ---- circuit ---- */
  .circuit{position:absolute;left:calc(50% - 175px);top:50%;width:720px;height:480px;
    transform:translateY(-50%);z-index:15;opacity:0;pointer-events:none}
  #app.focus .circuit{opacity:1;pointer-events:none}
  #app.focus .endpoint.drillable{pointer-events:auto}
  /* lines fade in at full length (no horizontal "grow" sweep) so a line end is
     never short of its dot mid-animation; the pulse dashes carry the motion */
  .circuit-lines{position:absolute;inset:0;width:100%;height:100%;opacity:0;transition:opacity .7s ease}
  #app.focus .circuit-lines{opacity:1}
  .trace{fill:none;stroke:rgba(154,184,255,.5);stroke-width:1.8;stroke-linecap:round}
  .pulse{fill:none;stroke:var(--trace-bright);stroke-width:2;stroke-linecap:round;stroke-dasharray:7 93;stroke-dashoffset:100;filter:drop-shadow(0 0 3px var(--trace-bright))}
  @media (prefers-reduced-motion:no-preference){.pulse{animation:flow linear infinite}}
  @keyframes flow{from{stroke-dashoffset:100}to{stroke-dashoffset:0}}
  /* anchor the DOT (first child, 9px) on the trace end at (dotx,it.y); label hangs below */
  .endpoint{position:absolute;transform:translate(-50%,-4.5px);text-align:center;opacity:0;transition:opacity .4s}
  #app.focus .endpoint{opacity:1;transition-delay:.45s}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--trace-bright);box-shadow:0 0 6px var(--trace-bright);margin:0 auto}
  .ep-label{color:var(--label);font-size:14px;font-weight:600;white-space:nowrap;margin-top:7px}
  .ep-feature{color:var(--feature);font-size:11.5px;white-space:nowrap;margin-top:2px}
  /* a drillable dot gets a ring + a small explore hint so it's findable */
  .endpoint.drillable{cursor:pointer}
  .endpoint.drillable .dot{box-shadow:0 0 6px var(--trace-bright),0 0 0 3px rgba(154,184,255,.18);animation:dpulse 2.2s ease-in-out infinite}
  @keyframes dpulse{0%,100%{box-shadow:0 0 6px var(--trace-bright),0 0 0 3px rgba(154,184,255,.16)}50%{box-shadow:0 0 10px var(--trace-bright),0 0 0 5px rgba(154,184,255,.08)}}
  .endpoint.drillable .ep-label{color:#CFE0FF}
  .ep-explore{display:block;color:#8FB0F0;font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;margin-top:3px;opacity:.9}

  /* ---- build canvas (K8s topology), right column ---- */
  .buildc{position:absolute;left:auto;right:150px;top:150px;width:560px;height:480px;
    z-index:16;opacity:0;pointer-events:none;transition:opacity .5s}
  #app.build .buildc{opacity:1}
  #app.build .circuit{opacity:0!important}
  #app.build.cardsonly .circuit{opacity:1!important}
  #app.build.cardsonly .buildc{opacity:0!important}
  /* in build, slabs + shield fully out of the way */
  #app.build .slab{opacity:0;filter:blur(1px);transition:transform 1s cubic-bezier(.22,.61,.36,1),opacity .6s}

  /* ---- left text panel ---- */
  .build-text{position:absolute;left:230px;top:172px;width:360px;z-index:18;
    opacity:0;pointer-events:none;transition:opacity .6s,left .55s cubic-bezier(.22,.61,.36,1)}
  #app.build .build-text{opacity:1;pointer-events:auto}
  /* card-only: centre the panel at rest, slide it left when a card is expanded */
  #app.build.cardsonly .build-text{left:480px}
  #app.build.cardsonly.has-active .build-text{left:230px}
  /* hero views: diagram stays put; expansion drops below the cards */
  .buildc{transition:opacity .5s,transform .55s cubic-bezier(.22,.61,.36,1)}
  .build-text h2{color:var(--title);font-size:25px;font-weight:600;letter-spacing:.01em;margin-bottom:14px;
    opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
  .build-text .intro{color:var(--subtitle);font-size:13.5px;line-height:1.55;margin-bottom:22px;
    opacity:0;transform:translateY(8px);transition:opacity .5s,transform .5s}
  .why{color:var(--feature);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
    margin-bottom:12px;opacity:0;transition:opacity .5s}
  #app.build .build-text.in h2{opacity:1;transform:none}
  #app.build .build-text.in .intro{opacity:1;transform:none;transition-delay:.12s}
  #app.build .build-text.in .why{opacity:1;transition-delay:.26s}
  .card{display:flex;gap:11px;align-items:flex-start;padding:11px 13px;margin-bottom:9px;border-radius:11px;
    background:rgba(40,46,62,.5);border:1px solid rgba(140,150,170,.16);
    opacity:0;transform:translateY(8px);transition:opacity .45s,transform .45s,border-color .25s,background .25s}
  #app.build .build-text.in #bt-cards .card{opacity:1;transform:none}
  #app.build .build-text.in #bt-cards .card:nth-child(1){transition-delay:.34s}
  #app.build .build-text.in #bt-cards .card:nth-child(2){transition-delay:.44s}
  #app.build .build-text.in #bt-cards .card:nth-child(3){transition-delay:.54s}
  .card.has-more .cplus{display:none}
  #app.build .card.has-more{cursor:pointer}
  #app.build .card.has-more .cplus{display:block}
  #app.build .card.has-more:hover{border-color:rgba(154,184,255,.5);background:rgba(48,56,78,.7)}
  .card.active{border-color:rgba(154,184,255,.75);background:rgba(48,56,78,.85)}
  .card .cbody{flex:1}
  .card .cplus{flex:none;align-self:center;color:#8FB0F0;font-size:18px;font-weight:400;line-height:1;
    transition:transform .25s,color .25s}
  .card.active .cplus{transform:rotate(45deg);color:#CFE0FF}
  .card .ic{flex:none;width:26px;height:26px;border-radius:7px;display:grid;place-items:center;
    background:rgba(250,140,25,.12);color:#F2A24B;font-size:14px;margin-top:1px}
  .card .ct{color:var(--label);font-size:13px;font-weight:600;margin-bottom:2px}
  .card .cd{color:var(--feature);font-size:11.5px;line-height:1.4}

  /* expand panel: opens in the centre gap when a card is clicked */
  .expand-panel{position:absolute;left:620px;top:185px;width:420px;z-index:20;
    background:rgba(34,40,54,.92);border:1px solid rgba(154,184,255,.28);border-radius:14px;
    padding:22px 24px;box-shadow:0 18px 50px rgba(0,0,0,.45);
    opacity:0;transform:translateY(10px) scale(.985);pointer-events:none;
    transition:opacity .4s cubic-bezier(.22,.61,.36,1),transform .4s cubic-bezier(.22,.61,.36,1),left .5s,width .5s}
  /* build views: the expansion opens on the right (in the topology's space) and the
     topology fades out, so the detail always fits on-screen and fills the width */
  #app.build:not(.cardsonly) .expand-panel{left:600px;top:172px;width:444px}
  #app.build:not(.cardsonly).has-active .buildc{opacity:0;pointer-events:none}
  .expand-panel.in{opacity:1;transform:none;pointer-events:auto}
  .expand-panel .xp-title{color:var(--title);font-size:17px;font-weight:600;margin-bottom:11px}
  .expand-panel .xp-body{color:#C4CBD9;font-size:13.5px;line-height:1.62}
  /* quiet docs link at the foot of the expanded panel (hidden until a URL is set) */
  .expand-panel .xp-readmore{display:none;margin-top:14px;color:#8FB0F0;font-size:11.5px;font-weight:600;
    letter-spacing:.04em;text-decoration:none;align-items:center;gap:5px;opacity:.85;transition:opacity .2s,color .2s}
  .expand-panel .xp-readmore.show{display:inline-flex}
  .expand-panel .xp-readmore:hover{opacity:1;color:#B9D0FF;text-decoration:underline}
  .expand-panel .xp-readmore .xp-arr{font-size:12px;line-height:1}
  /* when a hero build is showing, push the expand panel a bit so it doesn't cover the diagram */

  .buildc .bt{fill:#C9CFDD;font-size:12px;font-weight:600;letter-spacing:.02em}
  .buildc .bt-sub{fill:var(--feature);font-size:11px}
  /* build pieces start hidden; .show triggers the reveal */
  .bnode{opacity:0;transition:opacity .45s ease}
  .bnode.show{opacity:1}
  .cluster-box{fill:rgba(94,123,184,.06);stroke:#5C7AB8;stroke-width:1.4;stroke-dasharray:5 5}
  .ns-box{fill:rgba(126,102,174,.07);stroke:#8A78C0;stroke-width:1.3;rx:12}
  .pod{fill:rgba(40,46,62,.9);stroke:#9DB4E0;stroke-width:1.6;filter:drop-shadow(0 0 6px rgba(157,180,224,.5))}
  .link{stroke:var(--trace-bright);stroke-width:2;fill:none;stroke-linecap:round;opacity:.9;
    stroke-dasharray:var(--len);stroke-dashoffset:var(--len);transition:stroke-dashoffset .7s ease}
  .link.drawn{stroke-dashoffset:0}
  /* once drawn, allowed link gets a gentle dotted shimmer */
  .link.dotted{stroke-dasharray:4 6;animation:flow 2.4s linear infinite}
  .link.cut{stroke:#C56B6B;opacity:.7;stroke-dasharray:4 6}
  .link.threat{stroke:#FF6B6B;opacity:1;stroke-width:2.6;stroke-dasharray:4 5;animation:flow 1.1s linear infinite;
    filter:drop-shadow(0 0 6px rgba(255,107,107,.8))}
  .pod.threatnode{stroke:#FF6B6B;filter:drop-shadow(0 0 9px rgba(255,107,107,.85));animation:thrpulse 1.2s ease-in-out infinite}
  @keyframes thrpulse{0%,100%{filter:drop-shadow(0 0 7px rgba(255,107,107,.6))}50%{filter:drop-shadow(0 0 14px rgba(255,107,107,.95))}}
  .cutmark{stroke:#FF6B6B;stroke-width:3;stroke-linecap:round;opacity:0;transition:opacity .4s}
  .cutmark.show{opacity:1;filter:drop-shadow(0 0 5px rgba(255,107,107,.7))}
  .blocked-label{fill:#FF8A8A;font-size:11px;font-weight:600;opacity:0;transition:opacity .4s}
  .blocked-label.show{opacity:1}
  .allowed-label{fill:#7FE0A8;font-size:11px;font-weight:600;opacity:0;transition:opacity .4s}
  .allowed-label.show{opacity:1}
  /* ---- readable policy card (Network Policies hero) ---- */
  .policy-card{fill:rgba(30,35,48,.92);stroke:rgba(154,184,255,.30);stroke-width:1.4}
  .pol-head{display:flex;align-items:center;gap:10px;padding:14px 18px 0}
  .pol-kind{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#8FB0F0;
    background:rgba(143,176,240,.14);padding:3px 8px;border-radius:6px}
  .pol-name{font-size:15px;font-weight:600;color:#E8ECF4;font-family:ui-monospace,Menlo,Consolas,monospace}
  .pol-sel{padding:4px 18px 0;font-size:12px;color:#9AA4B8;font-family:ui-monospace,Menlo,Consolas,monospace}
  .pol-sel b{color:#C4CBD9;font-weight:600}
  .pol-row-fo{opacity:0;transform:translateY(6px);transition:opacity .4s ease,transform .4s ease}
  .pol-row-fo.show{opacity:1;transform:none}
  .pol-row{display:flex;align-items:center;gap:12px;margin:6px 14px;padding:9px 12px;border-radius:9px;
    font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;
    border-left:3px solid transparent;background:rgba(48,56,78,.45)}
  .pol-row.allow{border-left-color:#5BD08A;background:rgba(91,208,138,.08)}
  .pol-row.deny{border-left-color:#E06B6B;background:rgba(224,107,107,.10)}
  .pol-row .verdict{flex:none;width:48px;font-weight:700;letter-spacing:.04em}
  .pol-row.allow .verdict{color:#7FE0A8}
  .pol-row.deny .verdict{color:#FF8A8A}
  .pol-row .dir{flex:none;width:52px;color:#9AA4B8}
  .pol-row .flow{flex:1;color:#D5DBE8}
  .pol-row .flow b{color:#FFFFFF;font-weight:600}
  .pol-row .port{flex:none;color:#A9B2C6}
  /* ---- shapes for the new hero builders ---- */
  .ext-box{fill:rgba(60,66,84,.6);stroke:rgba(170,180,200,.4);stroke-width:1.3}
  .pod.gw-node{stroke:#F2A24B;filter:drop-shadow(0 0 8px rgba(242,162,75,.6))}
  .link.encrypted{stroke:#5BD08A;stroke-dasharray:3 4;animation:flow 1.6s linear infinite;filter:drop-shadow(0 0 5px rgba(91,208,138,.6))}
  .lock{fill:#F2A24B;stroke:none}
  .lock-shackle{fill:none;stroke:#F2A24B;stroke-width:2.4}
  .plane{fill:rgba(48,56,78,.5);stroke:rgba(140,150,170,.22);stroke-width:1.2}
  .plane.plane-active{fill:rgba(143,176,240,.16);stroke:#9DB4E0;stroke-width:1.6}
  .capture-g .cap-ring{fill:none;stroke:#F2A24B;stroke-width:2.6;filter:drop-shadow(0 0 6px rgba(242,162,75,.6))}
  .capture-g .cap-handle{stroke:#F2A24B;stroke-width:3;stroke-linecap:round}
  .vm-box{fill:rgba(126,102,174,.25);stroke:#BCA9DC;stroke-width:1.6;transition:x .8s cubic-bezier(.4,0,.2,1)}
  .ip-tag{fill:rgba(91,208,138,.18);stroke:#5BD08A;stroke-width:1.2;transition:x .8s cubic-bezier(.4,0,.2,1)}
  .vm-box,.ip-tag,.mig-text{transition:x .8s cubic-bezier(.4,0,.2,1)}
  .ztunnel{fill:rgba(143,176,240,.14);stroke:#8FB0F0;stroke-width:1.3}
  .mtls-badge{fill:rgba(91,208,138,.16);stroke:#5BD08A;stroke-width:1.3}
  .firewall-box{fill:rgba(242,162,75,.12);stroke:#F2A24B;stroke-width:1.6}
  /* ---- Calico Dashboards hero: stat tiles + bar / line / donut ---- */
  .dash-panel{fill:rgba(30,35,48,.92);stroke:rgba(154,184,255,.22);stroke-width:1.4}
  .dash-card{fill:rgba(48,56,78,.55);stroke:rgba(140,150,170,.18);stroke-width:1}
  .dash-title{fill:#C9CFDD;font-size:12px;font-weight:600}
  .dash-sub{fill:#9AA4B8;font-size:9.5px}
  .stat-val{fill:#E8ECF4;font-size:18px;font-weight:700}
  .stat-val.good{fill:#7FE0A8}
  .stat-val.warn{fill:#FF8A8A}
  .stat-lbl{fill:#9AA4B8;font-size:9px;letter-spacing:.04em}
  /* bars grow from baseline */
  .dbar{fill:#6E8BD6;transform-box:fill-box;transform-origin:bottom;transform:scaleY(0);
    transition:transform .7s cubic-bezier(.22,.61,.36,1)}
  .dbar.grown{transform:scaleY(1)}

<script>
  var app=document.getElementById('app');
  var linesSvg=document.querySelector('.circuit-lines');
  var circuit=document.querySelector('.circuit');
  var buildSvg=document.querySelector('.build-svg');
  var slabs=[].slice.call(document.querySelectorAll('.slab'));
  var NS='http://www.w3.org/2000/svg';
  function el(tag,attrs,cls){var e=document.createElementNS(NS,tag);if(cls)e.setAttribute('class',cls);for(var k in attrs)e.setAttribute(k,attrs[k]);return e;}
  function hexPts(cx,cy,r){var p=[];for(var i=0;i<6;i++){var a=Math.PI/180*(60*i-30);p.push((cx+r*Math.cos(a)).toFixed(1)+','+(cy+r*Math.sin(a)).toFixed(1));}return p.join(' ');}

  var SETS={
    networking:[{label:'Calico CNI',feature:'eBPF / nftables / VPP data planes',y:50},{label:'Ingress Gateway',feature:'Managed traffic into the cluster',y:130},{label:'Egress Gateway',feature:'Fixed source IP for outbound',y:210},{label:'Cluster Mesh',feature:'Multi-cluster connectivity',y:290},{label:'Istio Ambient Mode',feature:'Sidecarless service mesh',y:370},{label:'Firewall Integrations',feature:'Extend rules to Kubernetes',y:450}],
    security:[{label:'Calico Network Policies',feature:'L3-L7 traffic control',y:70},{label:'Microsegmentation',feature:'Limit lateral movement',y:175},{label:'DNS Policies & Network Sets',feature:'Egress access control',y:280},{label:'Encryption',feature:'WireGuard in-transit encryption',y:380},{label:'Compliance & Audit',feature:'PCI, HIPAA, SOC 2, NIST',y:455}],
    observability:[{label:'Service & Threat Graph',feature:'Live traffic topology',y:80},{label:'Calico Dashboards',feature:'Flow, DNS & L7 analytics',y:200},{label:'Dynamic Packet Capture',feature:'Self-service troubleshooting',y:320},{label:'IDS / IPS / WAF / DDoS',feature:'Workload threat detection',y:430}],
    vm:[{label:'Live Migration',feature:'Running VMs move live',y:90},{label:'IP Preservation',feature:'Stable addressing',y:240},{label:'Policy Continuity',feature:'Rules follow the VM',y:390}]
  };

  // Per-capability detail config:
  //   build: name of a topology builder (else null -> circuit stays, cards only)
  //   intro + cards: left-panel copy (Security drafted; others light placeholder)
  var DETAIL={
    'Microsegmentation':{build:'microseg',title:'Network Microsegmentation',
      intro:'Microsegmentation breaks the cluster into many small, controlled networks. Every workload sits inside its own policy boundary, and each connection must be explicitly allowed, enforced at the kernel level using identity, not IP addresses, so policies survive pod restarts and rescheduling.',
      cards:[['\u25C9','Zero Trust design','Default-deny posture between workloads.','In a Zero Trust model nothing is trusted by default, not even two pods in the same cluster. Calico lets you start from a default-deny baseline and then explicitly allow only the connections each workload actually needs. Because the rules are written against identity (ServiceAccounts, namespaces, and labels) rather than IP addresses, they keep working as pods restart, scale, and reschedule, so the security posture never drifts as the cluster changes.'],
             ['\u2261','Compliance & audit','Maps to PCI-DSS, SOC 2 and CIS.','Auditors want to know exactly who can talk to whom, and to see evidence it is enforced. Tiered, identity-based policy expresses that intent in a way that maps directly onto frameworks like PCI-DSS segmentation requirements, SOC 2, and the CIS Kubernetes Benchmark. Calico flow logs record every allowed and denied connection, so the audit evidence comes straight from the running cluster instead of a separate reporting pipeline.'],
             ['\u2699','Lateral movement containment','Stop a breach at its boundary.','Most serious breaches start small and then spread sideways, an attacker compromises one pod and pivots to others. Microsegmentation contains that blast radius: because each workload only accepts the traffic its policy allows, a compromised pod cannot reach services it was never authorized to talk to. Quarantine labels let you tighten policy around a suspect workload in seconds, isolating it while you investigate.']]},
    'Service & Threat Graph':{build:'threatgraph',title:'Service & Threat Graph',
      intro:'A live, point-in-time map of every workload and the connections between them. Calico draws the real traffic topology from flow data, so you can see what is actually talking to what, spot anomalies, and trace a threat the moment it appears.',
      cards:[['\u25C9','See the live topology','Rendered from real flows, not a diagram.','The Service Graph is built from actual flow data leaving your workloads, not a hand-drawn architecture diagram that goes stale the day it is made. It shows the services that exist right now and the connections genuinely happening between them, so platform and security teams share one accurate picture of how the cluster really behaves.'],
             ['\u26A0','Spot threats instantly','Anomalies light up as they happen.','Because the graph reflects live traffic, unusual or denied connections surface the instant they occur, a workload suddenly reaching a service it never talked to before, or a spike of blocked attempts. Those edges are highlighted on the graph, turning a wall of logs into an at-a-glance signal that something needs attention.'],
             ['\u2699','Trace & respond','Drill from an edge to the evidence.','When something looks wrong, you can click straight into a connection to see the workloads on each end, the policy that allowed or denied it, and, with dynamic packet capture, the packets themselves. That turns the graph from a picture into an investigation tool: see the problem, find the cause, and apply or tighten policy without leaving the view.']]},
    'Calico Network Policies':{build:'netpol',title:'Calico Network Policies',
      intro:'Express who can talk to whom at L3\u2013L7 using Kubernetes-native and Calico policies, ordered, tiered, and identity-aware.',
      cards:[['\u25C9','L3\u2013L7 control','From IP/port up to HTTP methods.','Calico policy spans the whole stack: classic L3\u2013L4 rules (IP, port, protocol) and, with the Istio ambient integration, L7 rules that understand HTTP methods and paths. You can write one coherent set of rules, from "these pods may reach the database on 5432" down to "only GET requests to /health are allowed", enforced consistently across the cluster.'],
             ['\u2261','Tiered & ordered','Guardrails and app rules coexist.','Policies live in ordered tiers, for example platform, security, and application. Higher tiers act as guardrails that lower tiers cannot circumvent, so a platform or security team can set rules that always take precedence while developer teams manage their own app policies in their namespaces. Everyone works independently without stepping on each other.'],
             ['\u2699','GitOps-ready','Policy as code, version-controlled.','Every policy is a declarative Kubernetes resource, so it can live in Git, go through code review, and deploy through your existing CI/CD or GitOps pipeline. Network security becomes versioned, auditable, and repeatable instead of a set of manual changes nobody can fully account for.']]},
    'DNS Policies & Network Sets':{build:'dns',title:'DNS Policies & Network Sets',
      intro:'Control egress by domain and by reusable IP/CIDR sets, so workloads only reach the external services you approve.',
      cards:[['\u25C9','Egress by domain','Allow trusted domains, deny the rest.','Instead of maintaining brittle lists of external IPs, DNS policy lets you allow egress to named domains, for example a payment API or a package registry, and deny everything else. Workloads reach the external services they legitimately need, while exfiltration to unknown destinations is blocked by default.'],
             ['\u2261','Reusable network sets','Define once, reference everywhere.','A network set is a named, reusable group of IPs, CIDRs, or domains. You define a set once, say "corporate CIDRs" or "approved partners", and reference it across many policies. Update the set in one place and every policy that uses it stays current, which keeps large rule bases manageable.'],
             ['\u2699','Stable as infra changes','Names, not brittle IP lists.','External services change IPs constantly, so hard-coded address lists rot quickly. Expressing intent with domains and named sets means policies describe "what" (this service, this group) rather than "where" (a specific IP today), so they stay correct as the underlying infrastructure shifts.']]},
    'Encryption':{build:'encryption',title:'Encryption in transit',
      intro:'Turn on WireGuard and Calico encrypts pod-to-pod traffic across nodes with a single setting, no app changes, low overhead.',
      cards:[['\u25C9','One-flag WireGuard','Cluster-wide encryption, no sidecars.','Calico uses WireGuard to encrypt traffic between nodes, and you enable it with a single configuration setting, no sidecar proxies to inject, no certificates to rotate by hand, and no changes to your applications. Encryption applies across the cluster automatically once it is turned on.'],
             ['\u2261','Node-to-node','Protects traffic crossing the network.','Pod-to-pod traffic that leaves one node for another is the most exposed part of cluster networking. WireGuard encrypts that traffic in transit, so even if the underlying network is shared or untrusted, the data moving between workloads on different nodes stays confidential.'],
             ['\u2699','Low overhead','Kernel-level performance.','WireGuard runs in the Linux kernel and is designed to be lightweight, so you get strong, modern encryption with far less performance cost than traditional VPN or proxy-based approaches, making always-on encryption practical for production clusters.']]},
    'Compliance & Audit':{build:null,title:'Compliance & Audit',
      intro:'Identity-based policy and complete flow logs give auditors who-talked-to-whom evidence, mapped to common frameworks.',
      cards:[['\u25C9','Audit-ready evidence','Every connection is logged.','Calico records flow logs for connections in the cluster, allowed and denied alike, capturing which workloads talked, when, and whether policy permitted it. That gives auditors concrete, queryable evidence of enforcement rather than a claim that controls exist.'],
             ['\u2261','Framework mapping','PCI-DSS, SOC 2, HIPAA, NIST.','Because policy is expressed as explicit, identity-based intent, it maps cleanly onto the segmentation and access-control requirements in frameworks like PCI-DSS, SOC 2, HIPAA, and NIST. The structure of your policy tiers mirrors the structure auditors expect to see.'],
             ['\u2699','No extra pipeline','Reports come from flow data.','The evidence lives in the same flow data Calico already collects, so compliance reporting draws straight from the running cluster. There is no separate logging stack to build and reconcile just to satisfy an audit.']]},
    'Calico CNI':{build:'cni',title:'Calico CNI',
      intro:'The networking engine for your cluster: Calico assigns pod IPs, routes traffic, and enforces policy. It runs the data plane you choose, standard Linux (iptables), eBPF, nftables, or VPP, so you can tune for compatibility or raw performance without changing how you write policy.',
      cards:[['\u25C9','Pluggable data planes','eBPF, standard Linux, nftables, VPP.','Calico is not locked to one implementation. The default "standard Linux" data plane uses iptables and works everywhere; the eBPF data plane runs in the kernel for higher throughput, lower latency, and direct server return; nftables and VPP cover newer and high-performance environments. You pick the data plane that fits, and your policies stay the same regardless of which one is running.'],
             ['\u2261','Runs anywhere','Every major cloud and distro.','Calico is the most widely deployed Kubernetes CNI, supported across all major managed Kubernetes services and self-managed distributions. The same networking and policy model works on EKS, AKS, GKE, OpenShift, and bare metal, so teams running multiple environments get one consistent way to network and secure their clusters.'],
             ['\u2699','Scales to large clusters','Proven at very high node counts.','Calico is built for scale, powering some of the largest Kubernetes deployments in production across millions of nodes worldwide. Its routing and policy engine are designed to stay efficient as clusters grow, so the networking layer is not the thing that limits how big you can go.']]},
    'Ingress Gateway':{build:'ingress',title:'Ingress Gateway',
      intro:'Manage north-south traffic coming into the cluster. Built on the Kubernetes Gateway API, the ingress gateway is the controlled front door, external requests enter through it and are routed to the right backend services, with policy applied at the edge.',
      cards:[['\u25C9','Controlled entry point','One managed front door in.','Rather than exposing services ad hoc, external traffic enters through a single managed gateway. That gives you one place to route, terminate, and secure inbound requests before they reach your workloads.'],
             ['\u2261','Gateway API native','Standard Kubernetes routing.','The ingress gateway is built on the Kubernetes Gateway API, the standard, portable way to express routing, so your entry configuration is declarative and not tied to a proprietary ingress controller.'],
             ['\u2699','Policy at the edge','Secure traffic as it arrives.','Because Calico policy applies to gateway traffic, you can enforce security on inbound flows right at the edge, keeping unwanted requests away from backend services.']]},
    'Egress Gateway':{build:'egress',title:'Egress Gateway',
      intro:'Give outbound pod traffic a predictable, fixed source IP. Selected workloads exit the cluster through the egress gateway, so external firewalls and partners can secure cluster traffic by IP without tracking ephemeral pod addresses.',
      cards:[['\u25C9','Predictable egress IP','Fixed source IP for outbound traffic.','Pods get ephemeral IPs that change constantly, which makes them impossible to allow-list on an external firewall. An egress gateway routes selected application traffic out through a stable, known source IP, so perimeter firewalls and third-party services can grant access to your workloads by IP, even though the pods behind it come and go.'],
             ['\u2261','Per-namespace routing','Map workloads to external networks.','You can map namespaces, or even individual pods, to specific egress gateways, so different teams or apps exit through different IPs and onto different external networks. This supports per-namespace perimeter security controls and even handles multiple external networks that have overlapping IP ranges.'],
             ['\u2699','Doubles as a NAT gateway','Avoid per-gigabyte cloud charges.','Because the egress gateway also performs outbound NAT, it can replace a cloud provider managed NAT gateway for cluster traffic, which can avoid the per-gigabyte data-processing fees those managed gateways charge, while keeping egress control inside Calico.']]},
    'Cluster Mesh':{build:'clustermesh',title:'Cluster Mesh',
      intro:'Connect multiple Kubernetes clusters into one network fabric. Workloads in different clusters can discover and reach each other, and a single consistent policy model spans them, so multi-cluster and multi-region architectures behave like one logical environment.',
      cards:[['\u25C9','Cross-cluster connectivity','Pods reach services in other clusters.','Cluster mesh links clusters so a workload in one can connect to a service in another as if they shared a network. That makes multi-region deployments, failover, and splitting workloads across clusters practical without bolting on a separate connectivity layer.'],
             ['\u2261','Consistent policy everywhere','One security model across clusters.','The same identity-based Calico policy model applies across the meshed clusters, so security intent does not stop at a cluster boundary. You define how workloads may talk to each other once, and it holds whether they live in the same cluster or different ones.'],
             ['\u2699','Built for scale & HA','Multi-region and resilient designs.','Spanning clusters underpins high-availability and disaster-recovery patterns, spreading a workload across regions, or failing over from one cluster to another, while keeping connectivity and policy consistent across the whole footprint.']]},
    'Istio Ambient Mode':{build:'istio',title:'Istio Ambient Mode',
      intro:'Calico integrates with Istio\u2019s sidecarless ambient mesh to add L7 capabilities, traffic management and observability, on top of Calico\u2019s L3\u2013L4 networking and policy, without injecting a proxy into every pod.',
      cards:[['\u25C9','Sidecarless mesh','No per-pod proxy to inject.','Traditional service mesh runs an Envoy sidecar in every pod, adding overhead and operational complexity. Ambient mode moves that work out of the pods, so you get mesh capabilities without the per-pod sidecar tax, lighter to run and simpler to operate.'],
             ['\u2261','L3\u2013L7 in one model','Calico L3\u2013L4 plus Istio L7.','The integration pairs Calico\u2019s network-layer policy (L3\u2013L4) with Istio\u2019s application-layer control (L7), giving consistent enforcement across both layers and unified visibility, defense in depth from one platform instead of two disconnected tools.'],
             ['\u2699','Dynamic L7 traffic control','Canary, blue-green, retries.','With L7 in the mesh you get dynamic traffic management, canary and blue-green rollouts, A/B routing, automatic retries, and circuit breaking, so developers can ship confidently while platform teams keep centralized control.']]},
    'Firewall Integrations':{build:'firewall',title:'Firewall Integrations',
      intro:'Extend your existing enterprise firewall controls into Kubernetes. Calico bridges the perimeter firewall world and the dynamic pod world, so security teams can keep their tools and policies while gaining visibility into cluster traffic.',
      cards:[['\u25C9','Bridge firewall & Kubernetes','Extend perimeter rules to pods.','Perimeter firewalls cannot see or track ephemeral pod IPs. Calico bridges that gap, pairing stable egress IPs and network sets with firewall rules, so existing firewall controls can meaningfully apply to cluster workloads.'],
             ['\u2261','Keep your existing tools','Work with what security owns.','Security teams have invested in firewall platforms and processes. The integration lets those controls extend to Kubernetes rather than forcing a rip-and-replace, so adopting containers does not mean abandoning the perimeter security stack.'],
             ['\u2699','Consistent enforcement','One intent, perimeter to pod.','By connecting firewall policy with Calico network policy, security intent stays consistent from the perimeter all the way down to individual pods, fewer gaps, and one coherent story for auditors and operators.']]},
    'Calico Dashboards':{build:'dashboards',title:'Calico Dashboards',
      intro:'Pre-built and custom dashboards that turn raw flow data into readable views, DNS, L7/HTTP, TCP, and flow logs, so teams can monitor network behaviour, security, and compliance at the workload level without building their own analytics stack.',
      cards:[['\u25C9','Workload-level insight','Flow, DNS, L7 and TCP views.','Dashboards aggregate flow data and present it at the level that matters, the workload, with dedicated views for DNS health, L7/HTTP traffic, TCP, and overall flow logs. Instead of grepping logs, teams get a readable picture of what their services are doing and where the problems are.'],
             ['\u2261','Pre-built and custom','Start fast, then tailor.','Built-in dashboard templates cover the common monitoring and security signals out of the box, so there is value on day one. Teams can then build custom dashboards for the metrics specific to their environment, compliance posture, or troubleshooting needs.'],
             ['\u2699','Context-rich data','Kubernetes metadata on every flow.','Flows are correlated with rich Kubernetes context, namespace, labels, service, process, and more, so a spike or anomaly on a dashboard can be traced back to the exact workload responsible, not just an IP address.']]},
    'Dynamic Packet Capture':{build:'capture',title:'Dynamic Packet Capture',
      intro:'Self-service, targeted packet capture for a live Kubernetes cluster. Start a capture on a specific workload right from the Service Graph or CLI, then download the pcap to analyse in your own tools, no node access or tcpdump gymnastics required.',
      cards:[['\u25C9','Capture on demand','Right-click a workload to capture.','Troubleshooting ephemeral microservices is hard because problems are brief and random. Dynamic packet capture lets you start or schedule a capture on a specific namespace, service, or pod directly from the Service Graph or CLI, so you grab the evidence while the issue is actually happening.'],
             ['\u2261','Kubernetes-native','No node SSH or manual tcpdump.','Capture is implemented the Kubernetes-native way: you target workloads by their Kubernetes identity rather than chasing pod IPs or SSHing into nodes. That makes it safe to hand to developers and SREs as a self-service tool.'],
             ['\u2699','Analyse in your tools','Export pcap to Wireshark.','Once a capture finishes, you download the standard pcap files and open them in whatever you already use, Wireshark or any analysis tool, so packet-level forensics and connectivity debugging fit into existing workflows.']]},
    'IDS / IPS / WAF / DDoS':{build:null,title:'Threat Detection & Prevention',
      intro:'Built-in workload-level threat defense: intrusion detection and prevention, a web application firewall, and DDoS protection, all operating inside the cluster on workload traffic, not just at the perimeter.',
      cards:[['\u25C9','IDS / IPS','Detect and stop malicious traffic.','Intrusion detection and prevention watch workload traffic for known-malicious patterns and suspicious behaviour, alerting on threats and blocking them, bringing detection inside the cluster where east-west traffic between workloads would otherwise be invisible to a perimeter device.'],
             ['\u2261','Workload WAF','Protect against HTTP attacks.','A workload-centric web application firewall inspects ingress and intra-cluster HTTP traffic and defends against common application exploits like SQL injection and cross-site scripting, protecting services from each other, not just from the outside world.'],
             ['\u2699','DDoS protection','Early packet processing.','Calico detects potential DDoS attacks through intelligent traffic analysis and mitigates them with early packet processing, dropping abusive traffic before it consumes workload resources.']]},
    'Live Migration':{build:'livemig',title:'Live Migration',
      intro:'Run virtual machines on Kubernetes with KubeVirt and move them between nodes without breaking connectivity. Calico coordinates the network handover so a live migration becomes a compute event, not a network outage.',
      cards:[['\u25C9','Move VMs without downtime','Migrate for maintenance or HA.','KubeVirt runs VMs inside pods, and Calico supports live-migrating them between nodes, for planned maintenance, load balancing, or high availability, with IPs preserved, minimal packet loss, and fast route convergence, so running connections survive the move.'],
             ['\u2261','Network identity travels','Same IP on the destination.','During migration the VM\u2019s IP needs to exist briefly on both source and destination nodes. Calico coordinates that handover, creating the target pod with the same IP and converging routes, so TCP connections and the VM\u2019s network identity carry over intact.'],
             ['\u2699','Policy applied before cutover','Never exposed mid-migration.','Calico ensures network policy is correctly applied to the VM on the destination host before migration traffic is switched, so the workload is never left unprotected during the transition.']]},
    'IP Preservation':{build:null,title:'IP Preservation',
      intro:'A KubeVirt VM should keep its address for its whole life, even though the pod running it is recreated on every restart, eviction, or migration. Calico anchors the IP to the VM\u2019s identity, not the pod\u2019s, so the address persists.',
      cards:[['\u25C9','Stable VM address','IP survives restarts & migration.','Normally IPAM ties an IP to a pod, so every VM restart or migration would hand out a fresh address, breaking connections and identity. Calico builds the IPAM handle from the VM\u2019s name instead, so the same IP is reassigned to each new pod and the VM keeps its address for life.'],
             ['\u2261','Dependencies keep working','Firewalls, DNS, load balancers.','Firewall rules, DNS records, and load balancer configs are all written against a VM\u2019s IP. Preserving that IP means none of those external dependencies break when the VM reboots or moves, avoiding a cascade of fixes across different teams.'],
             ['\u2699','Routable upstream','Advertise the VM IP over BGP.','The preserved IP can be advertised upstream over BGP, so the VM is reachable on a stable, routable address from outside the cluster, treating it like the long-lived host that applications expect it to be.']]},
    'Policy Continuity':{build:null,title:'Policy Continuity',
      intro:'A VM is just another workload to Calico, so the same Kubernetes-native network policy that protects your pods protects your VMs, consistently, and without gaps as the VM moves around the cluster.',
      cards:[['\u25C9','Same policy model as pods','One way to secure everything.','Because each KubeVirt VM is backed by a pod, standard Kubernetes and Calico network policies apply to VMs exactly as they do to containers, by namespace, label, IP block, or port. Teams secure VMs and containers with one consistent model instead of two.'],
             ['\u2261','Identity-based segmentation','Restrict VM traffic by intent.','Policy is expressed against workload identity, so you can segment VM traffic and allow only the connections each VM legitimately needs, the same Zero Trust posture you apply to microservices, extended to virtualized workloads.'],
             ['\u2699','Enforcement follows the VM','Protected on every node.','As a VM migrates, its policy is enforced on whatever node it lands on, applied on the destination before cutover, so there is no window where the VM runs without its security rules in effect.']]},
  };

  function buildCircuit(key){
    var items=SETS[key];linesSvg.innerHTML='';
    circuit.querySelectorAll('.endpoint').forEach(function(n){n.remove();});
    var NS='http://www.w3.org/2000/svg';var originY=240;
    items.forEach(function(it,idx){
      var dotx=400+idx*42;var c1x=180+idx*20,c2x=dotx-150;
      var d='M0,'+originY+' C'+c1x+','+originY+' '+c2x+','+it.y+' '+dotx+','+it.y;
      var base=document.createElementNS(NS,'path');base.setAttribute('class','trace');base.setAttribute('d',d);linesSvg.appendChild(base);
      var pulse=document.createElementNS(NS,'path');pulse.setAttribute('class','pulse');pulse.setAttribute('d',d);pulse.setAttribute('pathLength','100');pulse.style.animationDuration=(3.0+idx*0.5)+'s';pulse.style.animationDelay=(-0.6*idx)+'s';linesSvg.appendChild(pulse);
      var ep=document.createElement('div');ep.className='endpoint';ep.style.left=dotx+'px';ep.style.top=it.y+'px';
      var det=DETAIL[it.label];
      if(det){ ep.className='endpoint drillable'; ep.setAttribute('data-cap',it.label); }
      ep.innerHTML='<div class="dot"></div><div class="ep-label">'+it.label+(det?'<span class="ep-explore">Explore &rarr;</span>':'')+'</div><div class="ep-feature">'+it.feature+'</div>';
      circuit.appendChild(ep);
    });
  }

  var buildTimers=[];
  function clearBuild(){buildTimers.forEach(clearTimeout);buildTimers=[];buildSvg.innerHTML='';}
  function resetText(){var bt=document.querySelector('.build-text');if(bt)bt.classList.remove('in');}
  function step(fn,ms){buildTimers.push(setTimeout(fn,ms));}

  function buildMicroseg(){
    clearBuild();
    // 1) cluster boundary
    var cluster=el('rect',{x:40,y:60,width:680,height:400,rx:18},'bnode cluster-box');
    var clusterT=el('text',{x:56,y:88},'bt bnode');clusterT.textContent='Kubernetes cluster';
    buildSvg.appendChild(cluster);buildSvg.appendChild(clusterT);
    // 2) two namespaces
    var nsA=el('rect',{x:80,y:120,width:280,height:300,rx:12},'bnode ns-box');
    var nsAT=el('text',{x:96,y:146},'bt bnode');nsAT.textContent='namespace: frontend';
    var nsB=el('rect',{x:400,y:120,width:280,height:300,rx:12},'bnode ns-box');
    var nsBT=el('text',{x:416,y:146},'bt bnode');nsBT.textContent='namespace: payments';
    [nsA,nsAT,nsB,nsBT].forEach(function(n){buildSvg.appendChild(n);});
    // 3) pods (hexagons)
    var pods=[
      {cx:170,cy:250,ns:'A'},{cx:280,cy:340,ns:'A'},
      {cx:490,cy:250,ns:'B'},{cx:600,cy:340,ns:'B'}
    ];
    var podEls=pods.map(function(p){var h=el('polygon',{points:hexPts(p.cx,p.cy,30)},'bnode pod');buildSvg.appendChild(h);
      var t=el('text',{x:p.cx,y:p.cy+4,'text-anchor':'middle'},'bt bnode');t.setAttribute('font-size','10');t.textContent='pod';buildSvg.appendChild(t);return {h:h,t:t,p:p};});
    // 4) links: start/end at hexagon edge (not center) so they visibly span pod-to-pod
    function edgePoint(a,b,r){var dx=b.cx-a.cx,dy=b.cy-a.cy,L=Math.hypot(dx,dy)||1;return {x:a.cx+dx/L*r, y:a.cy+dy/L*r};}
    function linkPath(a,b){var r=32;var s=edgePoint(a,b,r),e=edgePoint(b,a,r);
      return 'M'+s.x.toFixed(1)+','+s.y.toFixed(1)+' C'+((s.x+e.x)/2).toFixed(1)+','+s.y.toFixed(1)+' '+((s.x+e.x)/2).toFixed(1)+','+e.y.toFixed(1)+' '+e.x.toFixed(1)+','+e.y.toFixed(1);}
    var allowed=el('path',{d:linkPath(pods[0],pods[1])},'bnode link');           // frontend pod->pod (allowed)
    var cross=el('path',{d:linkPath(pods[1],pods[2])},'bnode link');             // frontend->payments (to be blocked)
    buildSvg.appendChild(allowed);buildSvg.appendChild(cross);
    // set each link's length as the dash so it can "draw in"
    [allowed,cross].forEach(function(p){var L=p.getTotalLength();p.style.setProperty('--len',L.toFixed(1));});
    var allowedLbl=el('text',{x:225,y:300},'allowed-label');allowedLbl.textContent='allowed';
    var crossLbl=el('text',{x:360,y:250},'blocked-label');crossLbl.textContent='blocked by policy';
    buildSvg.appendChild(allowedLbl);buildSvg.appendChild(crossLbl);
    // 5) the cut mark (X) on the cross-namespace link midpoint
    var mx=(pods[1].cx+pods[2].cx)/2, my=(pods[1].cy+pods[2].cy)/2;
    var x1=el('line',{x1:mx-9,y1:my-9,x2:mx+9,y2:my+9},'cutmark');
    var x2=el('line',{x1:mx-9,y1:my+9,x2:mx+9,y2:my-9},'cutmark');
    buildSvg.appendChild(x1);buildSvg.appendChild(x2);

    // ---- sequenced reveal (hold at end, no loop) ----
    step(function(){cluster.classList.add('show');clusterT.classList.add('show');},120);
    step(function(){[nsA,nsAT,nsB,nsBT].forEach(function(n){n.classList.add('show');});},620);
    step(function(){podEls.forEach(function(o,i){step(function(){o.h.classList.add('show');o.t.classList.add('show');},i*180);});},1100);
    // allowed link: appear, draw in pod->pod, then settle into dotted shimmer
    step(function(){allowed.classList.add('show');},2000);
    step(function(){allowed.classList.add('drawn');},2060);
    step(function(){allowed.classList.add('dotted');allowedLbl.classList.add('show');},2820);
    // cross link: appear, draw in pod->pod
    step(function(){cross.classList.add('show');},2500);
    step(function(){cross.classList.add('drawn');},2560);
    // the microsegmentation moment: sever the cross-namespace link
    step(function(){ cross.classList.add('cut'); x1.classList.add('show');x2.classList.add('show');crossLbl.classList.add('show'); },3300);
  }

  function buildThreatGraph(){
    clearBuild();
    // cluster boundary
    var cluster=el('rect',{x:40,y:50,width:680,height:420,rx:18},'bnode cluster-box');
    var clusterT=el('text',{x:56,y:78},'bt bnode');clusterT.textContent='Service graph, live traffic';
    buildSvg.appendChild(cluster);buildSvg.appendChild(clusterT);
    // a small mesh of service nodes (hexagons)
    var nodes=[
      {cx:170,cy:160,n:'gateway'},{cx:360,cy:120,n:'web'},{cx:560,cy:170,n:'api'},
      {cx:250,cy:330,n:'auth'},{cx:470,cy:340,n:'db'},{cx:620,cy:300,n:'cache'}
    ];
    var nodeEls=nodes.map(function(p){
      var h=el('polygon',{points:hexPts(p.cx,p.cy,26)},'bnode pod');buildSvg.appendChild(h);
      var t=el('text',{x:p.cx,y:p.cy+4,'text-anchor':'middle'},'bt bnode');t.setAttribute('font-size','9');t.textContent=p.n;buildSvg.appendChild(t);
      return {h:h,t:t,p:p};
    });
    // edges (normal traffic) + one threat edge
    var edges=[[0,1],[1,2],[0,3],[3,4],[2,5],[1,4]];
    var threatEdge=[3,2]; // auth -> api : the anomalous one
    function edgePoint(a,b,r){var dx=b.cx-a.cx,dy=b.cy-a.cy,L=Math.hypot(dx,dy)||1;return {x:a.cx+dx/L*r,y:a.cy+dy/L*r};}
    function pathFor(ai,bi){var a=nodes[ai],b=nodes[bi];var s=edgePoint(a,b,26),e=edgePoint(b,a,26);
      return 'M'+s.x.toFixed(1)+','+s.y.toFixed(1)+' L'+e.x.toFixed(1)+','+e.y.toFixed(1);}
    var edgeEls=edges.map(function(pair){
      var base=el('path',{d:pathFor(pair[0],pair[1])},'bnode link');buildSvg.appendChild(base);
      base.style.setProperty('--len',base.getTotalLength().toFixed(1));return base;
    });
    var threat=el('path',{d:pathFor(threatEdge[0],threatEdge[1])},'bnode link');buildSvg.appendChild(threat);
    threat.style.setProperty('--len',threat.getTotalLength().toFixed(1));
    var threatLbl=el('text',{x:(nodes[3].cx+nodes[2].cx)/2-10,y:(nodes[3].cy+nodes[2].cy)/2-10},'blocked-label');threatLbl.textContent='threat detected';
    buildSvg.appendChild(threatLbl);

    // sequence: cluster -> nodes pop -> edges draw + traffic shimmer -> threat edge flares red
    step(function(){cluster.classList.add('show');clusterT.classList.add('show');},120);
    step(function(){nodeEls.forEach(function(o,i){step(function(){o.h.classList.add('show');o.t.classList.add('show');},i*140);});},500);
    step(function(){edgeEls.forEach(function(p,i){step(function(){p.classList.add('show');p.classList.add('drawn');},i*120);});},1500);
    step(function(){edgeEls.forEach(function(p){p.classList.add('dotted');});},2500);   // live traffic shimmer
    // threat flare
    step(function(){threat.classList.add('show');threat.classList.add('drawn');},2900);
    step(function(){threat.classList.add('threat');threatLbl.classList.add('show');
      // flare the two endpoint nodes too
      nodeEls[3].h.classList.add('threatnode');nodeEls[2].h.classList.add('threatnode');},3500);
  }

  function buildNetpol(){
    clearBuild();
    // a readable policy "document" rendered with HTML inside a foreignObject for crisp text
    var W=560, X=100, Y=70;
    var card=el('rect',{x:X,y:Y,width:W,height:340,rx:14},'bnode policy-card');
    buildSvg.appendChild(card);
    // policy header (kind + name)
    var head=el('foreignObject',{x:X+1,y:Y,width:W-2,height:64},'bnode');
    head.innerHTML='<div xmlns="http://www.w3.org/1999/xhtml" class="pol-head"><span class="pol-kind">NetworkPolicy</span><span class="pol-name">security.payments-allow</span></div>';
    buildSvg.appendChild(head);
    // selector line
    var sel=el('foreignObject',{x:X+1,y:Y+64,width:W-2,height:34},'bnode');
    sel.innerHTML='<div xmlns="http://www.w3.org/1999/xhtml" class="pol-sel">applies to: <b>app == "payments"</b> &nbsp;|&nbsp; default action: <b>Deny</b></div>';
    buildSvg.appendChild(sel);
    // rule rows: [verdict, text]
    var rules=[
      ['allow','Ingress','frontend','app == "payments"','TCP 5432'],
      ['allow','Egress','app == "payments"','dns / kube-system','UDP 53'],

    step(function(){toNet.classList.add('dotted');},3700);
  }

  // ---- Calico Dashboards: a mini analytics surface (stat tiles + bar + line + donut) ----
  function buildDashboards(){
    clearBuild();
    // gradient def for the area fill (added once into the build svg)
    var defs=el('defs',{});
    defs.innerHTML='<linearGradient id="dashArea" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0%" stop-color="#9AB8FF" stop-opacity="0.35"/>'+
      '<stop offset="100%" stop-color="#9AB8FF" stop-opacity="0"/></linearGradient>';
    buildSvg.appendChild(defs);

    // outer dashboard panel
    var panel=el('rect',{x:40,y:50,width:680,height:430,rx:16},'bnode dash-panel');
    var pTitle=el('text',{x:62,y:84},'bnode dash-title');pTitle.textContent='Calico Dashboards';
    var pSub=el('text',{x:62,y:101},'bnode dash-sub');pSub.textContent='Flow \u00B7 DNS \u00B7 L7 \u00B7 TCP analytics';
    buildSvg.appendChild(panel);buildSvg.appendChild(pTitle);buildSvg.appendChild(pSub);

    // ---- top stat tiles ----
    var tiles=[
      {x:62, val:'2.4M', lbl:'FLOWS / HR', cls:''},
      {x:235,val:'98.7%',lbl:'ALLOWED',    cls:'good'},
      {x:408,val:'1.3%', lbl:'DENIED',     cls:'warn'}
    ];
    var tileEls=tiles.map(function(t){
      var c=el('rect',{x:t.x,y:118,width:150,height:64,rx:10},'bnode dash-card');
      var v=el('text',{x:t.x+16,y:150},'bnode stat-val '+t.cls);v.textContent=t.val;
      var l=el('text',{x:t.x+16,y:170},'bnode stat-lbl');l.textContent=t.lbl;
      buildSvg.appendChild(c);buildSvg.appendChild(v);buildSvg.appendChild(l);
      return [c,v,l];
    });

    // ---- BAR card: flows by namespace ----
    var barCard=el('rect',{x:62,y:200,width:330,height:255,rx:10},'bnode dash-card');
    var barT=el('text',{x:80,y:226},'bnode dash-title');barT.setAttribute('font-size','11');barT.textContent='Flows by namespace';
    buildSvg.appendChild(barCard);buildSvg.appendChild(barT);
    var baseY=420, maxH=150;
    var bars=[['frontend',0.95,'' ],['payments',0.72,'b2'],['api',0.6,'b3'],['auth',0.42,'b4'],['kube-system',0.3,'b5']];
    var bw=42, gap=14, x0=92;
    var barEls=bars.map(function(bdef,i){
      var hgt=maxH*bdef[1];
      var bx=x0+i*(bw+gap);
      var r=el('rect',{x:bx,y:baseY-hgt,width:bw,height:hgt,rx:4},'bnode dbar '+bdef[2]);
      var lbl=el('text',{x:bx+bw/2,y:baseY+15},'bnode bar-lbl');lbl.textContent=bdef[0];
      buildSvg.appendChild(r);buildSvg.appendChild(lbl);
      return [r,lbl];
    });
    var baseAxis=el('line',{x1:x0-10,y1:baseY,x2:380,y2:baseY},'bnode axis');buildSvg.appendChild(baseAxis);

    // ---- LINE/AREA card: traffic over time ----
    var lineCard=el('rect',{x:408,y:200,width:250,height:120,rx:10},'bnode dash-card');
    var lineT=el('text',{x:426,y:226},'bnode dash-title');lineT.setAttribute('font-size','11');lineT.textContent='Traffic over time';
    buildSvg.appendChild(lineCard);buildSvg.appendChild(lineT);
    // build a smooth-ish polyline within the card plot area
    var lx0=426, lx1=640, ly0=238, ly1=305;
    var pts=[0.35,0.5,0.42,0.62,0.55,0.78,0.68,0.9];
    var coords=pts.map(function(v,i){
      var x=lx0+(lx1-lx0)*(i/(pts.length-1));
      var y=ly1-(ly1-ly0)*v;
      return [x,y];
    });
    var dLine='M'+coords.map(function(c){return c[0].toFixed(1)+','+c[1].toFixed(1);}).join(' L');
    var area=el('path',{d:dLine+' L'+lx1+','+ly1+' L'+lx0+','+ly1+' Z'},'bnode area-fill');
    var line=el('path',{d:dLine},'bnode line-path');
    buildSvg.appendChild(area);buildSvg.appendChild(line);
    line.style.setProperty('--len',line.getTotalLength().toFixed(1));
    var endDot=el('circle',{cx:coords[coords.length-1][0],cy:coords[coords.length-1][1],r:4},'bnode line-dot');
    buildSvg.appendChild(endDot);

    // ---- DONUT card: allowed vs denied ----
    var donutCard=el('rect',{x:408,y:335,width:250,height:120,rx:10},'bnode dash-card');
    var donutT=el('text',{x:426,y:361},'bnode dash-title');donutT.setAttribute('font-size','11');donutT.textContent='Allowed vs denied';
    buildSvg.appendChild(donutCard);buildSvg.appendChild(donutT);
    var dcx=486, dcy=405, dr=34, circ=2*Math.PI*dr;
    var allowFrac=0.88, denyFrac=0.12;
    // allowed arc (starts at top, sweeps clockwise)
    function arc(cls,frac,startFrac){
      var a=el('circle',{cx:dcx,cy:dcy,r:dr},'bnode donut-arc '+cls);
      a.style.setProperty('--len',circ.toFixed(1));
      // visible length = frac of circumference; offset so only that segment shows
      a.style.setProperty('--off',(circ*(1-frac)).toFixed(1));
      // rotate so segments sit head-to-tail, starting at 12 o'clock
      a.setAttribute('transform','rotate('+(-90+startFrac*360)+' '+dcx+' '+dcy+')');
      buildSvg.appendChild(a);return a;
    }
    var allowArc=arc('donut-allow',allowFrac,0);
    var denyArc =arc('donut-deny', denyFrac, allowFrac);
    var dCenter=el('text',{x:dcx,y:dcy+1},'bnode donut-center');dCenter.textContent='98.7%';
    var dCenterSub=el('text',{x:dcx,y:dcy+15},'bnode donut-center-sub');dCenterSub.textContent='allowed';
    buildSvg.appendChild(dCenter);buildSvg.appendChild(dCenterSub);
    // legend
    var lgAllow=el('rect',{x:548,y:392,width:10,height:10,rx:2},'bnode legend-sw');lgAllow.setAttribute('fill','#5BD08A');
    var lgAllowT=el('text',{x:564,y:401},'bnode legend-txt');lgAllowT.textContent='Allowed';
    var lgDeny=el('rect',{x:548,y:412,width:10,height:10,rx:2},'bnode legend-sw');lgDeny.setAttribute('fill','#E06B6B');
    var lgDenyT=el('text',{x:564,y:421},'bnode legend-txt');lgDenyT.textContent='Denied';
    [lgAllow,lgAllowT,lgDeny,lgDenyT].forEach(function(n){buildSvg.appendChild(n);});

    // ---- sequenced reveal ----
    step(function(){panel.classList.add('show');pTitle.classList.add('show');pSub.classList.add('show');},120);
    step(function(){tileEls.forEach(function(g,i){step(function(){g.forEach(function(n){n.classList.add('show');});},i*140);});},560);
    // bar card + bars grow
    step(function(){barCard.classList.add('show');barT.classList.add('show');baseAxis.classList.add('show');},1100);
    step(function(){barEls.forEach(function(g,i){step(function(){g[0].classList.add('show','grown');g[1].classList.add('show');},i*120);});},1450);
    // line card + draw line + area
    step(function(){lineCard.classList.add('show');lineT.classList.add('show');},1700);
    step(function(){line.classList.add('show','drawn');},2050);
    step(function(){area.classList.add('show');endDot.classList.add('show');},2750);
    // donut card + arcs sweep + legend
    step(function(){donutCard.classList.add('show');donutT.classList.add('show');},2400);
    step(function(){allowArc.classList.add('show','drawn');},2750);
    step(function(){denyArc.classList.add('show','drawn');},3050);
    step(function(){dCenter.classList.add('show');dCenterSub.classList.add('show');
      [lgAllow,lgAllowT,lgDeny,lgDenyT].forEach(function(n){n.classList.add('show');});},3300);
  }

  var crumb=document.querySelector('.crumb');
  var backbtn=document.querySelector('.backbtn');
  var TITLES={networking:'Networking',security:'Security',observability:'Observability',vm:'VM Migration'};
  function setCrumb(html){crumb.innerHTML=html;}

  function goLanding(){clearBuild();resetText();collapseExpand();slabs.forEach(function(s){s.classList.remove('is-focused','is-dimmed');});app.className='landing';app.removeAttribute('data-focus');setCrumb('');}
  function goStack(){clearBuild();resetText();collapseExpand();slabs.forEach(function(s){s.classList.remove('is-focused','is-dimmed');});app.className='stack';app.removeAttribute('data-focus');setCrumb('');}
  function focusSlab(slab){var key=slab.getAttribute('data-slab');slabs.forEach(function(s){s.classList.remove('is-focused','is-dimmed');});slab.classList.add('is-focused');slabs.forEach(function(s){if(s!==slab)s.classList.add('is-dimmed');});buildCircuit(key);app.className='focus';app.setAttribute('data-focus',key);setCrumb('<b>'+TITLES[key]+'</b>');}
  function populateText(cap){
    var d=DETAIL[cap]; if(!d) return;
    document.getElementById('bt-title').textContent=d.title;
    document.getElementById('bt-intro').textContent=d.intro;
    var wrap=document.getElementById('bt-cards'); wrap.innerHTML='';
    collapseExpand();
    d.cards.forEach(function(c,idx){
      var card=document.createElement('div'); card.className='card';
      var hasMore=c.length>3 && c[3];
      if(hasMore) card.classList.add('has-more');
      card.setAttribute('data-idx',idx);
      card.innerHTML='<div class="ic">'+c[0]+'</div><div class="cbody"><div class="ct">'+c[1]+'</div><div class="cd">'+c[2]+'</div></div>'+(hasMore?'<div class="cplus">+</div>':'');
      if(hasMore){
        card.addEventListener('click',function(e){ e.stopPropagation(); toggleExpand(cap,idx,card); });
      }
      wrap.appendChild(card);
    });
  }
  // expand a card's paragraph into the center gap (one at a time)
  var expandPanel=document.querySelector('.expand-panel');
  var readmoreEl=expandPanel?expandPanel.querySelector('.xp-readmore'):null;
  var activeExpand=null;
  function collapseExpand(){
    if(expandPanel){expandPanel.classList.remove('in');}
    if(readmoreEl){readmoreEl.classList.remove('show');readmoreEl.removeAttribute('href');}
    var prev=document.querySelector('.card.active'); if(prev)prev.classList.remove('active');
    app.classList.remove('has-active');
    activeExpand=null;
  }
  function toggleExpand(cap,idx,card){
    var d=DETAIL[cap]; var c=d.cards[idx];
    if(activeExpand===idx){ collapseExpand(); return; }   // click again collapses
    var prev=document.querySelector('.card.active'); if(prev)prev.classList.remove('active');
    card.classList.add('active');
    app.classList.add('has-active');
    expandPanel.querySelector('.xp-title').textContent=c[1];
    expandPanel.querySelector('.xp-body').textContent=c[3];
    // quiet docs link: show only when this capability has a (non-null) vetted URL
    if(readmoreEl){
      var url=DOC_URLS[cap];
      if(url){ readmoreEl.setAttribute('href',url); readmoreEl.classList.add('show'); }
      else   { readmoreEl.removeAttribute('href'); readmoreEl.classList.remove('show'); }
    }
    // when the panel slides left, wait a beat so the expansion appears as the gap opens
    expandPanel.classList.remove('in'); void expandPanel.offsetWidth;
    setTimeout(function(){ expandPanel.classList.add('in'); }, 160);
    activeExpand=idx;
  }
  var BUILDERS={microseg:buildMicroseg, threatgraph:buildThreatGraph, netpol:buildNetpol,
    clustermesh:buildClusterMesh, egress:buildEgress, dns:buildDns, encryption:buildEncryption,
    cni:buildCni, capture:buildCapture, livemig:buildLiveMig,
    ingress:buildIngress, istio:buildIstio, firewall:buildFirewall, dashboards:buildDashboards};
  function drillCap(cap){
    var d=DETAIL[cap]; if(!d) return;
    var pillar=TITLES[app.getAttribute('data-focus')]||'';
    app.className='build'; app.setAttribute('data-build',d.build||'cards'); app.setAttribute('data-cap',cap);
    setCrumb(pillar+'&nbsp;&rsaquo;&nbsp;<b>'+d.title+'</b>');
    populateText(cap);
    var bt=document.querySelector('.build-text'); bt.classList.remove('in');
    requestAnimationFrame(function(){ bt.classList.add('in'); });
    if(d.build && BUILDERS[d.build]){ buildTimers.push(setTimeout(BUILDERS[d.build],650)); }
    // if no build, the circuit stays visible on the right (card-only detail)
    app.classList.toggle('cardsonly', !d.build);
  }
  function backOne(){ var state=app.className.split(' ')[0];
    if(state==='build'){ var key=app.getAttribute('data-focus')||'security'; clearBuild(); resetText(); collapseExpand(); app.classList.remove('cardsonly'); app.className='focus'; app.setAttribute('data-focus',key); var fs=document.querySelector('.slab[data-slab="'+key+'"]'); slabs.forEach(function(s){s.classList.remove('is-focused','is-dimmed');}); if(fs){fs.classList.add('is-focused');} slabs.forEach(function(s){if(s.getAttribute('data-slab')!==key)s.classList.add('is-dimmed');}); setCrumb('<b>'+TITLES[key]+'</b>'); return; }
    if(state==='focus'){ goStack(); return; }
  }

  backbtn.addEventListener('click',function(e){ e.stopPropagation(); backOne(); });

  app.addEventListener('click',function(e){
    var state=app.className.split(' ')[0];var slab=e.target.closest('.slab');var shield=e.target.closest('.shieldWrap');
    var drill=e.target.closest('.endpoint.drillable');
    if(shield && (state==='focus'||state==='build')){ goLanding(); return; }
    if(state==='landing'){ if(shield) goStack(); return; }
    if(state==='stack'){ if(slab) focusSlab(slab); else goLanding(); return; }
    if(state==='focus'){ if(drill){ drillCap(drill.getAttribute('data-cap')); } else { goStack(); } return; }
    if(state==='build'){ if(e.target.closest('.build-text')||e.target.closest('.expand-panel')) return; backOne(); return; }
  });

  /* ---- fit the fixed-size stage into whatever container holds it ----
     The stage has a fixed internal coordinate space (1280x760). We scale it
     uniformly so it always fits the visible area (window or embed iframe),
     centered, without distortion. This keeps every element's relative
     position locked no matter the screen size or embed dimensions. */
  (function(){
    var stage=document.getElementById('stage');
    if(!stage) return;
    var BASE_W=1280, BASE_H=700;
    // Container-aware: measure the element the stage lives in, not the window.
    // Standalone / iframe -> the host is the page body (= the viewport), so this
    // behaves exactly as before. Embedded inline in a page region -> it scales
    // to that region instead of the whole window. Set the host's width/height
    // (or use an aspect-ratio wrapper) and the diagram fills it.
    function fit(){
      var host=stage.parentElement||document.documentElement;
      var availW=host.clientWidth||window.innerWidth;
      var availH=host.clientHeight||window.innerHeight;
      var scale=Math.min(availW/BASE_W, availH/BASE_H);
      // scale up to fill the area (vector/CSS stays crisp), capped so it never
      // gets absurd on very large displays.
      scale=Math.min(scale,2);
      stage.style.transform='scale('+scale+')';
    }
    fit();
    window.addEventListener('resize', fit);
    if(window.ResizeObserver){
      try{ new ResizeObserver(fit).observe(stage.parentElement||document.documentElement); }catch(e){}
    }
  })();
</script>
