<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calico Architecture — How Calico Sits in Your Cluster</title>
<style>
  :root{
    --bg:#1A1D24; --panel:#21252E; --panel-2:#272C37;
    --title:#F3F4F6; --subtitle:#9CA3AF; --label:#F5F7FB; --feature:#9CA3AF;
    --amber:#FA8C19; --amber-soft:rgba(250,140,25,.5);
    --line:#3A4A8C; --line-bright:#9AB8FF;
    --k8s:#5B8DEF; --k8s-deep:#3D6FB0;
    --node-edge:#9DB4E0; --ok:#5BD6A6; --warn:#E0B445;
    --crd:#C7A9DC;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0;background:var(--bg);color:var(--label);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;overflow:hidden}
  .topbar{position:absolute;top:26px;left:0;right:0;text-align:center;z-index:60;pointer-events:none}
  .topbar h1{margin:0;color:var(--title);font-size:25px;font-weight:600;letter-spacing:.01em}
  .topbar p{color:var(--subtitle);font-size:13px;margin-top:6px;letter-spacing:.06em}
  .shieldmini{position:absolute;top:22px;left:30px;z-index:61}
  .shieldmini img{width:42px;height:auto;filter:drop-shadow(0 0 8px var(--amber-soft))}

  /* tier selector (centered, below subtitle) */
  .tierbar{position:absolute;top:84px;left:50%;transform:translateX(-50%);z-index:61;display:flex;flex-direction:column;align-items:center;gap:7px}
  .tierbar .tb-h{color:var(--feature);font-size:10px;font-weight:600;letter-spacing:.13em;text-transform:uppercase}
  .tiertoggle{display:inline-flex;border:1px solid rgba(140,150,170,.26);border-radius:10px;overflow:hidden;background:var(--panel)}
  .tiertoggle button{padding:8px 16px;border:none;background:transparent;color:var(--subtitle);font-size:12.5px;
    font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .25s,color .25s;border-right:1px solid rgba(140,150,170,.18)}
  .tiertoggle button:last-child{border-right:none}
  .tiertoggle button.on{background:rgba(250,140,25,.16);color:#FFD9AC}
  .tier-note{font-size:10.5px;color:var(--feature);max-width:440px;text-align:center;line-height:1.5}
  .tier-links{display:flex;flex-wrap:wrap;gap:6px 14px;justify-content:center;margin-top:9px}
  .tier-links a{font-size:11px;color:var(--line-bright);text-decoration:none;border-bottom:1px solid rgba(154,184,255,.3);padding-bottom:1px;letter-spacing:.02em;transition:color .2s,border-color .2s}
  .tier-links a:hover{color:#C2D5FF;border-color:var(--line-bright)}
  .tier-links a.cta{color:#FFD9AC;border-color:rgba(250,140,25,.45)}
  .tier-links a.cta:hover{color:#FFE7C9;border-color:var(--amber)}
  /* tier toggle: briefly glow components that just became visible */
  @keyframes revealGlow{0%{filter:drop-shadow(0 0 13px var(--amber-soft))}100%{filter:drop-shadow(0 0 0 rgba(250,140,25,0))}}
  .comp.reveal .cbox{animation:revealGlow 1.5s ease-out}

  .stage{position:absolute;inset:0;z-index:10}
  .diagram-wrap{position:absolute;left:24px;right:24px;top:166px;bottom:172px}
  svg.arch{width:100%;height:100%;display:block;overflow:visible}

  /* nodes */
  .comp{cursor:pointer}
  .comp .cbox{fill:rgba(40,70,130,.9);stroke:var(--k8s);stroke-width:1.3;transition:fill .2s,stroke .2s,filter .2s}
  .comp:hover .cbox{fill:rgba(56,92,160,.95);filter:drop-shadow(0 0 7px rgba(91,141,239,.5))}
  .comp.sel .cbox{stroke:var(--amber);stroke-width:2;filter:drop-shadow(0 0 9px var(--amber-soft))}
  .comp.optional .cbox{fill:rgba(40,55,95,.55);stroke:rgba(120,140,200,.5);stroke-dasharray:5 4}
  .comp .ctitle{fill:#EAF1FF;font-size:15px;font-weight:700;text-anchor:middle;pointer-events:none}
  .comp .csub{fill:#9DB8E8;font-size:10.5px;text-anchor:middle;pointer-events:none}
  .comp.optional .ctitle{fill:#B9C7E8}
  .opt-tag{fill:var(--feature);font-size:9.5px;text-anchor:middle;letter-spacing:.08em;text-transform:uppercase}

  /* datastore = hero */
  .datastore{cursor:pointer}
  .datastore .dbox{fill:rgba(70,55,110,.92);stroke:var(--crd);stroke-width:1.8;transition:filter .2s}
  .datastore:hover .dbox{filter:drop-shadow(0 0 12px rgba(199,169,220,.55))}
  .datastore.sel .dbox{stroke:var(--amber);filter:drop-shadow(0 0 12px var(--amber-soft))}
  .datastore .dtitle{fill:#F0E8FA;font-size:15.5px;font-weight:700;text-anchor:middle;pointer-events:none}
  .datastore .dsub{fill:#C9B8E0;font-size:10.5px;text-anchor:middle;pointer-events:none}
  .ds-hint{fill:var(--crd);font-size:11px;text-anchor:middle;font-weight:600;letter-spacing:.02em;
    opacity:.85;animation:pulse 2.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}

  /* boundaries */
  .bound-rect{fill:rgba(33,37,46,.4);stroke-width:1.4;stroke-dasharray:6 5}
  .bound-cluster{stroke:rgba(120,150,220,.5)}
  .bound-node{stroke:rgba(157,180,224,.55);fill:rgba(40,46,62,.5)}
  .bound-ctl{stroke:rgba(199,169,220,.45);fill:rgba(50,42,72,.28)}
  .bound-title{fill:var(--label);font-size:14.5px;font-weight:600;letter-spacing:.03em}
  .bound-sub{fill:var(--feature);font-size:11px;letter-spacing:.02em}

  /* control-flow links + packets */
  .clink{fill:none;stroke:var(--line);stroke-width:1.4;stroke-linecap:round;stroke-opacity:.4}
  .clink.bgp{stroke:var(--ok);stroke-dasharray:5 4}
  .cpacket{fill:var(--line-bright);filter:drop-shadow(0 0 4px var(--line-bright))}
  .link-tag{fill:var(--feature);font-size:11px;text-anchor:middle;letter-spacing:.02em}

  /* detail / CRD side panel */
  .panel{position:absolute;top:166px;right:24px;width:320px;bottom:172px;z-index:46;
    background:var(--panel);border:1px solid rgba(140,150,170,.18);border-radius:14px;
    padding:22px;overflow-y:auto;box-shadow:-14px 0 40px rgba(10,12,16,.55);
    transition:transform .35s cubic-bezier(.5,0,.2,1),opacity .3s}
  .panel.hidden{transform:translateX(20px);opacity:0;pointer-events:none}
  .panel .p-eyebrow{color:var(--amber);font-size:10.5px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
  .panel h2{margin:8px 0 4px;color:var(--title);font-size:19px;font-weight:600}
  .panel .p-where{display:inline-block;font-size:10.5px;color:var(--feature);background:var(--panel-2);
    border:1px solid rgba(140,150,170,.2);border-radius:6px;padding:3px 9px;margin-bottom:13px;letter-spacing:.02em}
  .panel p{color:var(--subtitle);font-size:13px;line-height:1.62;margin:0 0 12px}
  .panel .p-role{color:var(--label)}
  .panel .p-link{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--line-bright);
    text-decoration:none;border-bottom:1px solid transparent;transition:border-color .2s}
  .panel .p-link:hover{border-color:var(--line-bright)}
  .panel .p-default{color:var(--feature);font-size:12.5px;line-height:1.6}
  .panel .p-default b{color:var(--label);font-weight:600}

  /* CRD groups */
  .crd-group{margin-bottom:15px}
  .crd-group h4{margin:0 0 7px;color:var(--crd);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
  .crd-chip{display:inline-block;font-size:11px;color:#E4DAF0;background:rgba(199,169,220,.12);
    border:1px solid rgba(199,169,220,.32);border-radius:7px;padding:4px 9px;margin:0 5px 6px 0;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-.01em}
  .crd-note{color:var(--feature);font-size:11px;line-height:1.55;margin-top:6px;font-style:italic}

  .legend{position:absolute;right:30px;top:28px;z-index:40;display:flex;flex-direction:column;gap:6px;align-items:flex-start;
    font-size:10.5px;color:var(--feature);background:rgba(28,32,40,.55);border:1px solid rgba(140,150,170,.12);
    border-radius:10px;padding:10px 13px;max-width:200px;opacity:.6;transition:opacity .25s}
  .legend:hover{opacity:1}
  .legend .lg-title{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--feature);margin-bottom:2px}
  .legend .lg-note{font-size:9.5px;line-height:1.5;color:var(--feature);margin-top:4px;border-top:1px solid rgba(140,150,170,.14);padding-top:7px}
  .legend .lg{display:flex;align-items:center;gap:6px}
  .legend .sw{width:14px;height:10px;border-radius:3px;display:inline-block}
  .legend .sw.core{background:rgba(56,92,160,.95);border:1px solid var(--k8s)}
  .legend .sw.opt{background:rgba(40,55,95,.55);border:1px dashed rgba(120,140,200,.6)}
  .legend .sw.ds{background:rgba(70,55,110,.92);border:1px solid var(--crd)}

  /* detail toggle (Core / + Advanced) — mirrors the legend on the left */
  .detailtoggle{position:absolute;left:30px;top:152px;z-index:40;display:flex;align-items:center;gap:8px;
    background:rgba(28,32,40,.55);border:1px solid rgba(140,150,170,.12);border-radius:10px;padding:7px 9px;opacity:.85;transition:opacity .25s}
  .detailtoggle:hover{opacity:1}
  .detailtoggle .dt-h{font-size:9.5px;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--feature)}
  .detailtoggle button{padding:5px 11px;border:1px solid rgba(140,150,170,.26);border-radius:7px;background:transparent;
    color:var(--subtitle);font-size:11.5px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .2s,color .2s,border-color .2s}
  .detailtoggle button:hover{color:var(--label);border-color:rgba(154,184,255,.5)}
  .detailtoggle button.on{background:rgba(250,140,25,.16);border-color:var(--amber);color:#FFD9AC}

  /* clickable cue on components */
  .comp .cbox,.datastore .dbox{transition:fill .2s,stroke .2s,filter .2s,transform .15s}
  .comp:hover{transform:translateY(-1px)}
  .comp:hover .cbox{filter:drop-shadow(0 0 9px rgba(91,141,239,.6))}
  .click-hint{position:absolute;left:50%;transform:translateX(-50%);top:198px;z-index:41;
    font-size:11.5px;color:var(--feature);background:rgba(33,37,46,.92);border:1px solid rgba(140,150,170,.25);
    border-radius:20px;padding:5px 14px;letter-spacing:.02em;pointer-events:none;
    animation:hintfade 6s ease forwards}
  @keyframes hintfade{0%,65%{opacity:1}100%{opacity:0;visibility:hidden}}

  /* actor */
  .actor text{pointer-events:none}

  /* walkthrough highlight / dim */
  .comp.wt-dim,.datastore.wt-dim,.actor.wt-dim{opacity:.28;transition:opacity .3s}
  .comp.wt-hi .cbox{stroke:var(--amber);stroke-width:2.4;fill:rgba(80,70,40,.95);filter:drop-shadow(0 0 12px var(--amber-soft))}
  .datastore.wt-hi .dbox{stroke:var(--amber);stroke-width:2.4;filter:drop-shadow(0 0 12px var(--amber-soft))}
  .actor.wt-hi circle{stroke:var(--amber)!important;stroke-width:2.2}
  .clink.wt-link-on{stroke:var(--amber)!important;stroke-opacity:1!important;stroke-width:2.4;
    marker-end:url(#flowHeadHot);filter:drop-shadow(0 0 5px var(--amber-soft))}

  /* walkthrough control bar (bottom-center) */
  .wtbar{position:absolute;left:50%;transform:translateX(-50%);bottom:20px;z-index:45;
    width:min(900px,calc(100% - 56px));background:rgba(28,32,40,.96);border:1px solid rgba(140,150,170,.24);
    border-radius:16px;padding:17px 26px 19px;backdrop-filter:blur(6px);box-shadow:0 12px 40px rgba(8,10,14,.55)}
  .wt-intro{text-align:center;font-size:13px;color:var(--feature);margin-bottom:14px;letter-spacing:.01em}
  .wt-intro b{color:#FFD9AC;font-weight:600}
  .wt-journeys{display:flex;gap:11px;justify-content:center;margin-bottom:15px}
  .wt-j{flex:0 1 auto;padding:9px 18px;border-radius:9px;border:1px solid rgba(140,150,170,.26);
    background:transparent;color:var(--subtitle);font-size:13px;font-weight:600;cursor:pointer;
    letter-spacing:.01em;transition:background .2s,color .2s,border-color .2s}
  .wt-j:hover{color:var(--label);border-color:rgba(154,184,255,.5)}
  .wt-j.on{background:rgba(250,140,25,.14);border-color:var(--amber);color:#FFD9AC}
  .wt-controls{display:flex;align-items:center;justify-content:center;gap:14px}
  .wt-btn{padding:9px 21px;border-radius:9px;border:1px solid rgba(140,150,170,.3);background:transparent;
    color:var(--subtitle);font-size:13.5px;font-weight:600;cursor:pointer;transition:all .2s}
  .wt-btn:hover:not(:disabled){color:var(--label);border-color:rgba(140,150,170,.55)}
  .wt-btn.primary{border-color:var(--amber);background:rgba(250,140,25,.14);color:#FFD9AC}
  .wt-btn.primary:hover:not(:disabled){background:rgba(250,140,25,.24)}
  .wt-btn:disabled{opacity:.4;cursor:default}
  .wt-count{font-size:12.5px;color:var(--feature);min-width:86px;text-align:center;letter-spacing:.02em}
  .wt-cap{margin-top:15px;font-size:14.5px;line-height:1.6;color:var(--subtitle);text-align:center;min-height:44px}
  .wt-cap b{color:var(--label);font-weight:600}
  .wt-nudge{display:block;margin-top:8px;font-size:11.5px;color:var(--ok)}
  .wt-nudge a{color:#FFD9AC;text-decoration:none;border-bottom:1px solid rgba(255,217,172,.4);padding-bottom:1px}
  .wt-nudge a:hover{border-color:#FFD9AC}
  /* one-time attention pulse on the Trace button so users find the payoff */
  .wt-btn.primary.pulse{animation:tracepulse 1.6s ease-in-out 3}
  @keyframes tracepulse{0%,100%{box-shadow:0 0 0 0 rgba(250,140,25,0)}50%{box-shadow:0 0 0 5px rgba(250,140,25,.22)}}
</style>
</head>

/* ---- builders ---- */
function boundary(g,x,y,w,h,cls,title,sub){
  var grp=el("g",null,"boundary");
  grp.appendChild(el("rect",{x:x,y:y,width:w,height:h,rx:13},"bound-rect "+cls));
  if(title){var t=el("text",{x:x+16,y:y+23},"bound-title");t.textContent=title;grp.appendChild(t);}
  if(sub){var s=el("text",{x:x+16,y:y+39},"bound-sub");s.textContent=sub;grp.appendChild(s);}
  g.insertBefore(grp,g.firstChild);
  return grp;
}
function comp(g,key,cx,cy,w,h){
  var c=COMPONENTS[key];
  var grp=el("g",null,"comp"+(c.core?"":" optional"));
  grp.setAttribute("data-key",key);
  grp.appendChild(el("rect",{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:8},"cbox"));
  var t=el("text",{x:cx,y:cy-1},"ctitle");t.textContent=c.name;grp.appendChild(t);
  var sub=c.where.split("\u00b7")[0].trim();
  var s=el("text",{x:cx,y:cy+12},"csub");s.textContent=sub;grp.appendChild(s);
  if(!c.core){var o=el("text",{x:cx,y:cy-h/2-5},"opt-tag");o.textContent="optional";grp.appendChild(o);}
  grp._cx=cx;grp._cy=cy;grp._w=w;grp._h=h;
  grp.addEventListener("click",function(){selectComp(key,grp);});
  g.appendChild(grp);
  return grp;
}
function datastore(g,cx,cy,w,h){
  var grp=el("g",null,"datastore");grp.setAttribute("data-key","__datastore__");
  grp.appendChild(el("rect",{x:cx-w/2,y:cy-h/2,width:w,height:h,rx:9},"dbox"));
  var t=el("text",{x:cx,y:cy-4},"dtitle");t.textContent="Datastore";grp.appendChild(t);
  var s=el("text",{x:cx,y:cy+9},"dsub");s.textContent="Kubernetes API (kdd) \u00b7 default";grp.appendChild(s);
  var h2=el("text",{x:cx,y:cy+h/2+15},"ds-hint");h2.textContent="\u25B8 click to see the CRDs that live here";grp.appendChild(h2);
  grp._cx=cx;grp._cy=cy;grp._w=w;grp._h=h;
  grp.addEventListener("click",function(){selectDatastore(grp);});
  g.appendChild(grp);
  return grp;
}
function clink(g,a,b,opts){
  opts=opts||{};
  var x1=a._cx,y1=a._cy,x2=b._cx,y2=b._cy;
  // attach to edges
  if(opts.from==="bottom")y1=a._cy+a._h/2; if(opts.from==="top")y1=a._cy-a._h/2;
  if(opts.from==="right")x1=a._cx+a._w/2; if(opts.from==="left")x1=a._cx-a._w/2;
  if(opts.to==="bottom")y2=b._cy+b._h/2; if(opts.to==="top")y2=b._cy-b._h/2;
  if(opts.to==="right")x2=b._cx+b._w/2; if(opts.to==="left")x2=b._cx-b._w/2;
  var pts;
  if(opts.elbow){var my=opts.midY!=null?opts.midY:(y1+y2)/2;pts=[[x1,y1],[x1,my],[x2,my],[x2,y2]];}
  else pts=[[x1,y1],[x2,y2]];
  var d=rounded(pts,7);
  var cls="clink"+(opts.bgp?" bgp":"");
  var p=el("path",{d:d},cls);
  // directional arrowhead unless suppressed
  if(!opts.noArrow)p.setAttribute("marker-end", opts.bgp?"url(#flowHeadGreen)":"url(#flowHead)");
  g.appendChild(p);p._len=p.getTotalLength();
  if(opts.tag){var mx=(x1+x2)/2,mty=(opts.midY!=null?opts.midY:(y1+y2)/2)-6;
    var t=el("text",{x:mx,y:mty},"link-tag");t.textContent=opts.tag;g.appendChild(t);p._tag=t;}
  if(!opts.noPacket)packets.push({path:p,len:p._len,t:Math.random()});
  p._a=a;p._b=b;p._key=(opts.key||null);
  return p;
}
function rounded(pts,r){
  if(pts.length<3)return "M"+pts[0][0]+" "+pts[0][1]+" L"+pts[1][0]+" "+pts[1][1];
  var d="M"+pts[0][0]+" "+pts[0][1];
  for(var i=1;i<pts.length-1;i++){
    var p0=pts[i-1],p1=pts[i],p2=pts[i+1];
    function v(a,b){var dx=b[0]-a[0],dy=b[1]-a[1],L=Math.hypot(dx,dy)||1;return[dx/L,dy/L];}
    var v1=v(p0,p1),v2=v(p1,p2);
    var rr=Math.min(r,Math.hypot(p1[0]-p0[0],p1[1]-p0[1])/2,Math.hypot(p2[0]-p1[0],p2[1]-p1[1])/2);
    var a=[p1[0]-v1[0]*rr,p1[1]-v1[1]*rr],b=[p1[0]+v2[0]*rr,p1[1]+v2[1]*rr];
    d+=" L"+a[0]+" "+a[1]+" Q"+p1[0]+" "+p1[1]+" "+b[0]+" "+b[1];
  }
  var last=pts[pts.length-1];d+=" L"+last[0]+" "+last[1];
  return d;
}

/* ---- packet animation ---- */
var lastTs=0;
function tick(ts){
  if(!lastTs)lastTs=ts;var dt=Math.min(60,ts-lastTs);lastTs=ts;
  packets.forEach(function(pk){
    if(pk._hide){ if(pk.dot)pk.dot.style.display="none"; return; }
    pk.t+=0.00009*dt; if(pk.t>1)pk.t-=1;
    var pt=pk.path.getPointAtLength(pk.t*pk.len);
    if(!pk.dot){pk.dot=el("circle",{r:3},"cpacket");arch.appendChild(pk.dot);}
    pk.dot.style.display="";
    pk.dot.setAttribute("cx",pt.x.toFixed(1));pk.dot.setAttribute("cy",pt.y.toFixed(1));
  });
  rafId=requestAnimationFrame(tick);
}

/* ---- selection / panel ---- */
function clearSel(){
  Array.prototype.forEach.call(arch.querySelectorAll(".sel"),function(n){n.classList.remove("sel");});
}
function selectComp(key,grp){
  clearSel();grp.classList.add("sel");selKey=key;
  var c=COMPONENTS[key];
  var p=$("panel");p.classList.remove("hidden");
  p.innerHTML='<div class="p-eyebrow">Component</div>'+
    '<h2>'+c.name+'</h2>'+
    '<span class="p-where">'+c.where+'</span>'+
    '<p class="p-role">'+c.role+'</p>'+
    '<a class="p-link" href="'+c.doc+'" target="_blank" rel="noopener">Read the docs \u2197</a>';
}
function selectDatastore(grp){
  clearSel();grp.classList.add("sel");selKey="__datastore__";
  var p=$("panel");p.classList.remove("hidden");
  var html='<div class="p-eyebrow">Datastore</div>'+
    '<h2>Where your CRDs live</h2>'+
    '<span class="p-where">Kubernetes API datastore (kdd)</span>'+
    '<p>By default Calico stores all its state as <b>Custom Resource Definitions</b> in your cluster\u2019s own Kubernetes API \u2014 so they get native RBAC and audit logging, with no extra database to run. (etcd is supported for non-Kubernetes hosts.)</p>';
  CRDS.forEach(function(grp){
    html+='<div class="crd-group"><h4>'+grp.group+'</h4>';
    grp.items.forEach(function(it){html+='<span class="crd-chip">'+it+'</span>';});
    html+='</div>';
  });
  html+='<p class="crd-note">You manage these with <b>kubectl</b> (via the Calico API server) or <b>calicoctl</b>. Felix reads them \u2014 through Typha \u2014 and programs the dataplane.</p>'+
    '<a class="p-link" href="https://docs.tigera.io/calico/latest/reference/resources" target="_blank" rel="noopener">Full resource reference \u2197</a>';
  p.innerHTML=html;
}

/* ---- tier + detail selectors (combined visibility engine) ---- */
var ADV={bird:1,confd:1,csi:1,dikastes:1,goldmane:1,whisker:1}; // live behind the "+ Advanced" toggle
var curTier="oss", curDetail="core";
function tierOK(c){ if(c.ossOnly)return curTier==="oss"; if(c.tier!=="oss")return curTier!=="oss"; return true; }
function gateLink(link,on){
  if(!link)return;
  link.style.display=on?"":"none";
  if(link._tag)link._tag.style.display=on?"":"none";
  packets.forEach(function(pk){ if(pk.path===link){ pk._hide=!on; if(pk.dot)pk.dot.style.display=on?"":"none"; } });
}
function refreshVisibility(){
  var anyComm=(curTier!=="oss");
  Array.prototype.forEach.call(arch.querySelectorAll(".comp"),function(n){
    var key=n.getAttribute("data-key"), c=COMPONENTS[key];
    if(!c)return;
    var show=tierOK(c) && (ADV[key] ? curDetail==="all" : true);
    var wasHidden=(n.style.display==="none");
    n.style.display=show?"":"none";
    if(show&&wasHidden){ n.classList.add("reveal"); (function(el){setTimeout(function(){el.classList.remove("reveal");},1500);})(n); }
  });
  var obsShown=(curTier==="oss" && curDetail==="all");
  var obs=arch.querySelector(".oss-obs-band"); if(obs)obs.style.display=obsShown?"":"none";
  gateLink(LINKS.goldWhisk, obsShown);
  gateLink(LINKS.confdBird, curDetail==="all");
  var cl=arch.querySelector(".comm-label"); if(cl)cl.style.display=anyComm?"":"none";
}
function applyTier(tier){
  curTier=tier;

  $("tierNote").textContent=TIER_NOTES[tier];
  var tl=$("tierLinks");

  refreshVisibility();
}
function applyDetail(mode){
  curDetail=mode;
  Array.prototype.forEach.call(document.querySelectorAll("#detailtoggle button"),function(b){ b.classList.toggle("on",b.getAttribute("data-detail")===mode); });
  refreshVisibility();
}

/* ---- WALKTHROUGH: two journeys that trace how Calico works ---- */
var JOURNEYS={
  policy:{
    label:"How a policy becomes enforcement",
    steps:[
      {node:"actor",link:"youApi",cap:"<b>1. You write a policy.</b> You apply a NetworkPolicy (or Calico GlobalNetworkPolicy) with kubectl \u2014 a simple YAML rule describing who may talk to whom."},
      {node:"apiserver",link:"apiDs",cap:"<b>2. The API server accepts it.</b> Kubernetes (via the Calico API server) validates the rule and writes it to the datastore as a Calico resource."},
      {node:"ds",cap:"<b>3. It lands in the datastore.</b> The rule now lives as a CRD in your cluster's own Kubernetes API \u2014 the single source of truth, with native RBAC and audit."},
      {node:"typha",link:"dsTypha",cap:"<b>4. Typha picks it up.</b> Typha watches the datastore and fans the change out to every node \u2014 filtered, so each Felix only gets what's relevant to it."},
      {node:"felix",link:"typhaFelix",cap:"<b>5. Felix receives it on every node.</b> The per-node agent gets the new rule through Typha \u2014 this is happening on all N nodes at once."},
      {node:"kern",link:"felixKern",cap:"<b>6. Felix programs the kernel.</b> Felix translates the rule into iptables or eBPF in the Linux dataplane \u2014 now the policy is enforced in the datapath. Traffic is allowed or dropped accordingly."}
    ]
  },
  pod:{
    label:"How a pod gets connected",
    steps:[
      {node:"felix",cap:"<b>1. A pod is scheduled to this node.</b> Kubernetes places a new pod here; the node's kubelet is told to set it up."},
      {node:"cni",cap:"<b>2. kubelet calls the CNI plugin.</b> The Calico CNI binary is invoked to give the new pod its network."},
      {node:"ipam",link:"cniIpam",cap:"<b>3. IPAM assigns an address.</b> Calico's IPAM plugin allocates an IP for the pod from one of your IPPools \u2014 efficiently, in blocks."},
      {node:"felix",link:"felixIpam",cap:"<b>4. Felix wires the interface.</b> Felix sets up the pod's network interface and routes, and applies any policy that already selects this pod."},
      {node:"kern",link:"felixKern",cap:"<b>5. The dataplane is programmed.</b> Routes and ACLs are written into the Linux kernel \u2014 the pod can now send and receive traffic, already governed by policy."}
    ]
  }
};
var wt={active:null,step:-1};

function buildWalkthrough(){
  // panel-independent control bar (bottom-center)
  var bar=document.createElement("div");bar.id="wtbar";bar.className="wtbar";
  bar.innerHTML=
    '<div class="wt-intro">Calico does two jobs: it <b>connects</b> your pods and <b>secures</b> them. Trace each below.</div>'+
    '<div class="wt-journeys">'+
      '<button class="wt-j on" data-j="policy">How a policy becomes enforcement</button>'+
      '<button class="wt-j" data-j="pod">How a pod gets connected</button>'+
    '</div>'+
    '<div class="wt-controls">'+
      '<button id="wtBack" class="wt-btn" disabled>\u2190 Back</button>'+
      '<span id="wtCount" class="wt-count">Step 0 / 0</span>'+
      '<button id="wtNext" class="wt-btn primary">Trace the journey \u2192</button>'+
      '<button id="wtRestart" class="wt-btn ghost" disabled>\u21bb Restart</button>'+
    '</div>'+
    '<div id="wtCap" class="wt-cap">Pick a journey above, then step through how Calico actually works.</div>';
  document.querySelector(".stage").appendChild(bar);

  Array.prototype.forEach.call(bar.querySelectorAll(".wt-j"),function(b){
    b.onclick=function(){ switchJourney(b.getAttribute("data-j")); };
  });
  $("wtNext").onclick=function(){ if(!wt.active)wt.active="policy"; this.classList.remove("pulse"); stepWalk(1); };
  $("wtBack").onclick=function(){ stepWalk(-1); };
  $("wtRestart").onclick=function(){ wt.step=-1;resetWalk();updateWalkUI(); };
  wt.active="policy";
  // one-time attention pulse so users discover the walkthrough
  var nb=$("wtNext"); nb.classList.add("pulse");
  setTimeout(function(){nb.classList.remove("pulse");},5200);
}

function resetWalk(){
  // clear all journey highlight state
  Array.prototype.forEach.call(arch.querySelectorAll(".comp,.datastore,.actor"),function(n){n.classList.remove("wt-hi","wt-dim");});
  for(var k in LINKS){LINKS[k].classList.remove("wt-link-on");}
}
function nodeEl(name){
  if(name==="actor")return arch.querySelector(".actor");
  if(name==="kern")return null; // kernel is decorative; skip highlight box
  if(name==="ds")return arch.querySelector(".datastore");
  return arch.querySelector('.comp[data-key="'+name+'"]');
}
function stepWalk(dir){
  var steps=JOURNEYS[wt.active].steps;
  wt.step=Math.max(-1,Math.min(steps.length-1,wt.step+dir));
  applyWalkStep();updateWalkUI();
}
function applyWalkStep(){
  resetWalk();
  if(wt.step<0)return;
  var steps=JOURNEYS[wt.active].steps;
  // dim everything, then spotlight the active node + light its link
  Array.prototype.forEach.call(arch.querySelectorAll(".comp,.datastore,.actor"),function(n){
    if(n.style.display!=="none")n.classList.add("wt-dim");
  });
  var s=steps[wt.step];
  var ne=nodeEl(s.node); if(ne){ne.classList.remove("wt-dim");ne.classList.add("wt-hi");}
  if(s.link && LINKS[s.link])LINKS[s.link].classList.add("wt-link-on");
}
function updateWalkUI(){
  var steps=JOURNEYS[wt.active].steps;
  var atStart=wt.step<0, atEnd=wt.step>=steps.length-1;
  $("wtBack").disabled=atStart;
  $("wtRestart").disabled=atStart;
  $("wtCount").textContent="Step "+(wt.step+1)+" / "+steps.length;
  $("wtNext").textContent=atEnd?"Done \u2713":(atStart?"Trace the journey \u2192":"Next \u2192");
  $("wtNext").disabled=atEnd;
  var other = wt.active==="policy" ? "pod" : "policy";
  if(wt.step<0){
    $("wtCap").innerHTML="<b>"+JOURNEYS[wt.active].label+"</b> \u2014 press \u201cTrace the journey\u201d to step through it.";
  } else if(atEnd){
    $("wtCap").innerHTML=steps[wt.step].cap+
      '<span class="wt-nudge">\u2713 That\u2019s the full path. <a href="#" id="wtOther">Now trace \u201c'+JOURNEYS[other].label+'\u201d \u2192</a></span>';
    var ol=$("wtOther");
    if(ol)ol.onclick=function(e){e.preventDefault();switchJourney(other);};
  } else {
    $("wtCap").innerHTML=steps[wt.step].cap;
  }
}
function switchJourney(j){
  var bar=$("wtbar");
  Array.prototype.forEach.call(bar.querySelectorAll(".wt-j"),function(x){x.classList.toggle("on",x.getAttribute("data-j")===j);});
  wt.active=j;wt.step=-1;resetWalk();updateWalkUI();
}

/* ---- BUILD DIAGRAM ---- */
var NODES={}, LINKS={};
function build(){
  // arrowhead + glow marker defs
  var defs=el("defs",null,null);
  function head(id,color){
    var m=el("marker",{id:id,viewBox:"0 0 10 10",refX:"11",refY:"5",markerWidth:"5",markerHeight:"5",orient:"auto-start-reverse"});
    m.appendChild(el("path",{d:"M0 1.5 L9 5 L0 8.5",fill:"none",stroke:color,"stroke-width":"1.6","stroke-linecap":"round","stroke-linejoin":"round"}));defs.appendChild(m);
  }
  head("flowHead","rgba(154,184,255,.5)");
  head("flowHeadGreen","rgba(91,214,166,.5)");
  head("flowHeadHot","rgba(255,217,172,.9)");
  arch.appendChild(defs);

  // ---- Cluster boundary (landscape) ----
  boundary(arch,110,16,1170,430,"bound-cluster","Your Kubernetes cluster","");

  // ---- Control plane lane (cluster-wide) ----
  boundary(arch,140,66,770,150,"bound-ctl","Control plane (cluster-wide)","");
  var apiserver=comp(arch,"apiserver",250,146,160,58);
  var operator=comp(arch,"operator",430,146,160,58);
  var kubec=comp(arch,"kubecontrollers",620,146,180,58);
  var typha=comp(arch,"typha",810,146,150,58);

  // ---- Datastore: source-of-truth column on the right ----
  var ds=datastore(arch,1080,150,232,120);

  // ---- Data plane lane (per node) with stacked-depth cards for "x N" ----
  arch.appendChild(el("rect",{x:150,y:230,width:760,height:206,rx:14,fill:"rgba(40,46,62,.18)",stroke:"rgba(157,180,224,.16)","stroke-width":1.2,"stroke-dasharray":"6 5"}));
  arch.appendChild(el("rect",{x:145,y:233,width:760,height:206,rx:14,fill:"rgba(40,46,62,.3)",stroke:"rgba(157,180,224,.26)","stroke-width":1.2,"stroke-dasharray":"6 5"}));
  boundary(arch,140,236,770,200,"bound-node","Data plane","");
  var rep=el("g",null,null);
  rep.appendChild(el("rect",{x:706,y:244,width:190,height:24,rx:12,fill:"rgba(91,141,239,.18)",stroke:"var(--k8s)","stroke-width":1}));
  var rt=el("text",{x:801,y:260,fill:"#CFE0FF","font-size":"12.5","font-weight":"700","text-anchor":"middle"});rt.textContent="× N nodes · calico/node DaemonSet";rep.appendChild(rt);
  arch.appendChild(rep);
  var felix=comp(arch,"felix",235,322,160,58);
  var cni=comp(arch,"cni",415,322,150,58);
  var ipam=comp(arch,"ipam",580,322,150,58);
  var bird=comp(arch,"bird",235,400,150,52);
  var confd=comp(arch,"confd",410,400,150,52);
  var csi=comp(arch,"csi",585,400,160,52);
  var dikastes=comp(arch,"dikastes",775,400,160,52);

  // Linux kernel (the dataplane Felix programs)
  var kern=el("g",null,null);
  var kx=800,ky=322;
  kern.appendChild(el("rect",{x:kx-82,y:ky-29,width:164,height:58,rx:8,fill:"rgba(40,46,62,.6)",stroke:"rgba(157,180,224,.4)","stroke-width":1.2,"stroke-dasharray":"3 3"}));
  var kt=el("text",{x:kx,y:ky-3,fill:"#C7D4EC","font-size":"13.5","font-weight":"600","text-anchor":"middle"});kt.textContent="Linux kernel";kern.appendChild(kt);
  var ks=el("text",{x:kx,y:ky+14,fill:"#9DB8E8","font-size":"10","text-anchor":"middle"});ks.textContent="iptables / eBPF dataplane";kern.appendChild(ks);
  arch.appendChild(kern);
  var kernRef={_cx:kx,_cy:ky,_w:164,_h:58};

  // ---- Observability (OSS, advanced) / Commercial (CE+Cloud) share the lower-right slot ----
  var obsBand=boundary(arch,928,290,340,92,"bound-ctl","Observability (OSS, 3.30+)","");obsBand.classList.add("oss-obs-band");
  var goldmane=comp(arch,"goldmane",1013,340,150,48);
  var whisker=comp(arch,"whisker",1183,340,150,48);
  var manager=comp(arch,"manager",1013,340,150,48);
  var threat=comp(arch,"threatdefense",1183,340,150,48);
  var commLabel=el("text",{x:944,y:284,fill:"#9CA3AF","font-size":"11","text-anchor":"start"},"comm-label");
  commLabel.textContent="Commercial add-ons (Enterprise / Cloud)";arch.appendChild(commLabel);
  commLabel.style.display="none";

  // ---- actor (you / kubectl) ----
  var actor=el("g",null,"actor");
  actor.appendChild(el("circle",{cx:0,cy:0,r:16,fill:"rgba(40,46,62,.9)",stroke:"var(--feature)","stroke-width":1.3,transform:"translate(52,118)"}));
  var au=el("text",{x:52,y:124,fill:"#C7D4EC","font-size":"16","text-anchor":"middle","font-weight":"700"});au.textContent="⌨";actor.appendChild(au);
  var al=el("text",{x:52,y:152,fill:"#9CA3AF","font-size":"10.5","text-anchor":"middle"});al.textContent="you · kubectl";actor.appendChild(al);
  arch.appendChild(actor);
  var actorRef={_cx:52,_cy:118,_w:32,_h:32};

  // ---- control-flow links (keys preserved for the journeys) ----
  LINKS.operApi   = clink(arch,operator,apiserver,{from:"left",to:"right",noPacket:true,key:"operApi"});
  LINKS.youApi    = clink(arch,actorRef,apiserver,{from:"right",to:"left",noPacket:true,key:"youApi"});
  LINKS.apiDs     = clink(arch,apiserver,ds,{from:"top",to:"top",elbow:true,midY:52,key:"apiDs"});
  LINKS.kubeDs    = clink(arch,kubec,ds,{from:"top",to:"top",elbow:true,midY:40,key:"kubeDs"});
  LINKS.dsTypha   = clink(arch,ds,typha,{from:"left",to:"right",tag:"watch",key:"dsTypha"});
  LINKS.typhaFelix= clink(arch,typha,felix,{from:"bottom",to:"top",elbow:true,midY:224,tag:"fan-out (filtered)",key:"typhaFelix"});
  LINKS.felixKern = clink(arch,felix,kernRef,{from:"top",to:"top",elbow:true,midY:282,tag:"program dataplane",key:"felixKern"});
  LINKS.cniIpam   = clink(arch,cni,ipam,{from:"right",to:"left",key:"cniIpam"});
  LINKS.confdBird = clink(arch,confd,bird,{from:"left",to:"right",bgp:true,tag:"reload",key:"confdBird"});
  LINKS.goldWhisk = clink(arch,goldmane,whisker,{from:"right",to:"left",tag:"flows",key:"goldWhisk"});
  LINKS.felixIpam = clink(arch,felix,ipam,{from:"bottom",to:"top",elbow:true,midY:372,noPacket:true,noArrow:true,key:"felixIpam"});

  // store node refs for the walkthrough
  NODES={operator:operator,apiserver:apiserver,kubec:kubec,typha:typha,ds:ds,
    goldmane:goldmane,whisker:whisker,felix:felix,bird:bird,confd:confd,
    cni:cni,ipam:ipam,csi:csi,dikastes:dikastes,kern:kernRef,actor:actorRef};

  applyTier("oss");
  buildWalkthrough();
  lastTs=0;rafId=requestAnimationFrame(tick);
}

// tier wiring
Array.prototype.forEach.call(document.querySelectorAll("#tiertoggle button"),function(b){
  b.addEventListener("click",function(){applyTier(b.getAttribute("data-tier"));});
});
// detail (Core / + Advanced) wiring
Array.prototype.forEach.call(document.querySelectorAll("#detailtoggle button"),function(b){
  b.addEventListener("click",function(){applyDetail(b.getAttribute("data-detail"));});
});
// click empty space closes panel
arch.addEventListener("click",function(e){
  if(e.target===arch){clearSel();$("panel").classList.add("hidden");selKey=null;}
});

build();
})();

</script>
